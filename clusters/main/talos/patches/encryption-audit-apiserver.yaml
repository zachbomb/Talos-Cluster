# Phase 2 of 2: kube-apiserver extraArgs + extraVolumes ONLY.
#
# This patch wires the apiserver to read the EncryptionConfiguration and
# audit policy files. It does NOT write any machine.files — those are
# already on disk from phase 1 (encryption-audit-files.secret.yaml).
#
# Apply ORDER MATTERS:
#   1. Apply phase 1, reboot, verify files exist on disk via:
#        talosctl read /var/etc/kubernetes/encryption-config.yaml
#        talosctl read /var/etc/kubernetes/audit-policy.yaml
#        talosctl ls /var/log/k8s-audit/
#   2. ONLY THEN apply this phase. It should NOT require a reboot —
#      apiserver static pod regenerates with the new extraArgs/extraVolumes
#      and restarts. ~10-30s API outage.
#
# This patch contains no secrets, so it is not SOPS-encrypted.

cluster:
  apiServer:
    extraArgs:
      encryption-provider-config: /etc/kubernetes/encryption-config.yaml
      audit-policy-file: /etc/kubernetes/audit-policy.yaml
      audit-log-path: /var/log/audit/audit.log
      audit-log-maxsize: "100"
      audit-log-maxbackup: "5"
    extraVolumes:
      # Bind /var/etc/kubernetes/encryption-config.yaml (host, written by phase 1)
      # → /etc/kubernetes/encryption-config.yaml (in apiserver pod).
      - hostPath: /var/etc/kubernetes/encryption-config.yaml
        mountPath: /etc/kubernetes/encryption-config.yaml
        readonly: true
      # Bind /var/etc/kubernetes/audit-policy.yaml (host, written by phase 1)
      # → /etc/kubernetes/audit-policy.yaml (in apiserver pod).
      - hostPath: /var/etc/kubernetes/audit-policy.yaml
        mountPath: /etc/kubernetes/audit-policy.yaml
        readonly: true
      # Bind /var/log/k8s-audit/ (host, ensured-exists by phase 1's .keep
      # sentinel) → /var/log/audit/ (in apiserver pod, writable). Alloy
      # DaemonSet hostPath-mounts /var/log/k8s-audit/ on the host directly
      # to ship audit events to Loki.
      - hostPath: /var/log/k8s-audit
        mountPath: /var/log/audit
        readonly: false
