---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
  namespace: tools
spec:
  releaseName: searxng
  interval: 15m
  timeout: 20m
  chart:
    spec:
      chart: searxng
      version: 11.0.6
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-searxng"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}

    service:
      main:
        enabled: true
        type: ClusterIP
        ports:
          main:
            enabled: true
            port: 10105
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: search.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: SearXNG
            description: Privacy Search Engine
            group: Tools
            widget:
              enabled: false

    persistence:
      config:
        enabled: true
        size: 1Gi
        mountPath: /etc/searxng
        volsync:
          - name: config
            type: restic
            credentials: s3
            dest:
              enabled: false
              cacheCapacity: 2Gi
            src:
              enabled: true
              cacheCapacity: 2Gi

    securityContext:
      container:
        readOnlyRootFilesystem: false

    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
