# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tandoor-recipes
  namespace: home
spec:
  interval: 15m
  timeout: 20m
  releaseName: tandoor-recipes
  chart:
    spec:
      chart: tandoor-recipes
      version: 21.7.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      repository: docker.io/vabene1111/recipes
      pullPolicy: IfNotPresent
      tag: 2.6.13
    TZ: America/Los_Angeles
    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-tandoor-recipes"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}
    ingress:
      main:
        enabled: true
        hosts:
          - host: tandoor.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
            middlewares:
              - name: secure-chain
                namespace: traefik
                # Disable TrueCharts release-name prefix mangling on the
                # middleware name (without this, chart renders the reference
                # as `traefik-tandoor-recipes-secure-chain` which doesn't exist).
                expandObjectName: false
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Tandoor
            description: Recipe Organizer
            group: Lifestyle & Home
            icon: ""
            widget:
              enabled: false
    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${TANDOOR_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${TANDOOR_IP}
        ports:
          main:
            port: 10029
            targetPort: 10029
            protocol: http
    cnpg:
      main:
        enabled: false
    workload:
      main:
        podSpec:
          containers:
            main:
              # Probes default to HTTP GET /, but Tandoor's first request after
              # boot triggers django-vite production asset compilation which
              # blocks the response past the 1s default timeout. kube-probe
              # closes the socket (status 499 in nginx logs) and after enough
              # failures the container is killed. Use TCP probes — gunicorn
              # binding to the socket is sufficient liveness/readiness signal.
              probes:
                liveness:
                  enabled: true
                  type: tcp
                  port: 10029
                readiness:
                  enabled: true
                  type: tcp
                  port: 10029
                startup:
                  enabled: true
                  type: tcp
                  port: 10029
              env:
                DB_ENGINE: django.db.backends.sqlite3
                POSTGRES_HOST: ""
                POSTGRES_PASSWORD: ""
                POSTGRES_PORT: ""
                POSTGRES_USER: ""
                POSTGRES_DB: ""
                ENABLE_PDF_EXPORT: "1"
                CSRF_TRUSTED_ORIGINS: "https://tandoor.${BASE_DOMAIN}"
    resources:
      requests:
        cpu: 10m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      database:
        enabled: true
        size: 1Gi
        mountPath: /opt/recipes/database
        volsync:
          - name: database
            type: restic
            credentials: s3
            dest:
              enabled: true
              cacheCapacity: 2Gi
            src:
              enabled: true
              cacheCapacity: 2Gi
              trigger:
                schedule: "28 3 * * *"
      config:
        enabled: true
        size: 2Gi
        mountPath: /config
        volsync:
          - name: config
            type: restic
            credentials: s3
            dest:
              enabled: true
              cacheCapacity: 2Gi
            src:
              enabled: true
              cacheCapacity: 2Gi
              trigger:
                schedule: "20 3 * * *"
      media:
        enabled: true
        size: 2Gi
        mountPath: /opt/recipes/mediafiles
        volsync:
          - name: media
            type: restic
            credentials: s3
            dest:
              enabled: true
              cacheCapacity: 2Gi
            src:
              enabled: true
              cacheCapacity: 2Gi
              trigger:
                schedule: "36 3 * * *"
      static:
        enabled: true
        size: 1Gi
        mountPath: /opt/recipes/staticfiles
        volsync:
          - name: static
            type: restic
            credentials: s3
            dest:
              enabled: true
              cacheCapacity: 2Gi
            src:
              enabled: true
              cacheCapacity: 2Gi
    autoscaling:
      vpa:
        enabled: false
