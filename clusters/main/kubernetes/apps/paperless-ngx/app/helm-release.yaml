---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: tools
spec:
  releaseName: paperless-ngx
  interval: 15m
  timeout: 20m
  chart:
    spec:
      chart: paperless-ngx
      version: 14.11.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Migrated off Bitnami (paid bitnamisecure tier, HTTP 401 on pull) to
    # the official upstream valkey/valkey image (#182). The TrueCharts redis
    # subchart defaults to the bitnami entrypoint + /health probe scripts;
    # valkey/valkey is a plain image, so we override command/args/probes:
    #   - run valkey-server directly with --requirepass (valkey/valkey does
    #     NOT read the bitnami VALKEY_PASSWORD env var)
    #   - --dir /tmp --save "" --appendonly no: pure in-memory cache (no PVC;
    #     losing it on restart just re-queues work). /tmp is a writable
    #     emptyDir (the image default /data is owned by UID 999, not 568).
    #   - probes use valkey-cli -a instead of the bitnami /health scripts.
    redis:
      image:
        repository: docker.io/valkey/valkey
        tag: 8.1.8-alpine
        pullPolicy: IfNotPresent
      workload:
        main:
          podSpec:
            containers:
              main:
                command:
                  - valkey-server
                args:
                  - --requirepass
                  - PLACEHOLDERPASSWORD
                  - --port
                  - "6379"
                  - --dir
                  - /tmp
                  - --save
                  - ""
                  - --appendonly
                  - "no"
                probes:
                  liveness:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]
                  readiness:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]
                  startup:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]

    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-paperless"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${PAPERLESS_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${PAPERLESS_IP}
        ports:
          main:
            enabled: true
            port: 10140
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: paperless.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Paperless-ngx
            description: Document Management
            group: Lifestyle & Home
            widget:
              enabled: false

    persistence:
      data:
        enabled: true
        size: 10Gi
        mountPath: /usr/src/paperless/data
        volsync:
          - name: data
            type: restic
            credentials: s3
            dest:
              enabled: false
              cacheCapacity: 8Gi
            src:
              enabled: true
              cacheCapacity: 8Gi
              trigger:
                schedule: "40 2 * * *"
      media:
        enabled: true
        size: 20Gi
        mountPath: /usr/src/paperless/media
        volsync:
          - name: media
            type: restic
            credentials: s3
            dest:
              enabled: false
              cacheCapacity: 8Gi
            src:
              enabled: true
              cacheCapacity: 8Gi
              trigger:
                schedule: "56 2 * * *"
      consume:
        enabled: true
        size: 5Gi
        mountPath: /usr/src/paperless/consume
      export:
        enabled: true
        size: 5Gi
        mountPath: /usr/src/paperless/export

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0
      pod:
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch

    cnpg:
      main:
        cluster:
          storage:
            size: 5Gi
          # Expanded 2Gi → 8Gi on 2026-05-28 — WAL filled (100%) overnight
          # and caused paperless-ngx to crashloop for 18h waiting on
          # paperless-ngx-cnpg-main-rw:5432 with "Not enough disk space".
          walStorage:
            size: 8Gi

    resources:
      requests:
        cpu: 10m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 2Gi
