---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: tools
spec:
  releaseName: paperless-ngx
  interval: 15m
  timeout: 20m
  chart:
    spec:
      chart: paperless-ngx
      version: 14.8.2
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # TrueCharts redis subchart valkey image, moved off the paid
    # bitnamisecure tier (HTTP 401, would break on the next Talos upgrade
    # when images re-pull) to the FREE bitnamilegacy archive. Same Bitnami
    # image shape — identical entrypoint, VALKEY_PASSWORD handling, and
    # /health probe scripts — so it's a true drop-in (verified 2026-06-10).
    # bitnamilegacy is a frozen archive (valkey 8.1.3, no further updates);
    # acceptable for a cache/queue store. Digest-pinned for reproducibility.
    # Resolves task #182.
    redis:
      image:
        repository: docker.io/bitnamilegacy/valkey
        tag: 8.1.3@sha256:7fb981553408c77c8801a501fbd82043763cbcc87268988a442c5dac0b6ff1b5
        pullPolicy: IfNotPresent

    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-paperless"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${PAPERLESS_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${PAPERLESS_IP}
        ports:
          main:
            enabled: true
            port: 10140
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: paperless.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Paperless-ngx
            description: Document Management
            group: Lifestyle & Home
            widget:
              enabled: false

    persistence:
      data:
        enabled: true
        size: 10Gi
        mountPath: /usr/src/paperless/data
        volsync:
          - name: data
            type: restic
            credentials: s3
            dest:
              enabled: false
              cacheCapacity: 8Gi
            src:
              enabled: true
              cacheCapacity: 8Gi
      media:
        enabled: true
        size: 20Gi
        mountPath: /usr/src/paperless/media
        volsync:
          - name: media
            type: restic
            credentials: s3
            dest:
              enabled: false
              cacheCapacity: 8Gi
            src:
              enabled: true
              cacheCapacity: 8Gi
      consume:
        enabled: true
        size: 5Gi
        mountPath: /usr/src/paperless/consume
      export:
        enabled: true
        size: 5Gi
        mountPath: /usr/src/paperless/export

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0
      pod:
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch

    cnpg:
      main:
        cluster:
          storage:
            size: 5Gi
          # Expanded 2Gi → 8Gi on 2026-05-28 — WAL filled (100%) overnight
          # and caused paperless-ngx to crashloop for 18h waiting on
          # paperless-ngx-cnpg-main-rw:5432 with "Not enough disk space".
          walStorage:
            size: 8Gi

    resources:
      requests:
        cpu: 10m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 2Gi
