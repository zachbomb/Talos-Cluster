---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: tools
spec:
  releaseName: paperless-ngx
  interval: 15m
  timeout: 20m
  chart:
    spec:
      chart: paperless-ngx
      version: 14.8.2
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Pin the TrueCharts redis subchart's valkey image to the exact digest
    # currently cached on the node. TrueCharts default = docker.io/bitnamisecure/valkey:latest,
    # which requires Bitnami Premium auth (HTTP 401). Image is cached and survives
    # in-place, but next eviction/restart fails to pull. Pinning by digest
    # gives us a known-good snapshot and removes the floating-tag risk.
    # Tracked in tasks #181 (this pin) and #182 (migrate to valkey/valkey).
    redis:
      image:
        repository: docker.io/bitnamisecure/valkey
        tag: latest@sha256:5ce04fc20634fa151c6050a3aea9fdf30b709509a27af5af1a379b73d18ad58f
        pullPolicy: IfNotPresent

    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-paperless"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${PAPERLESS_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${PAPERLESS_IP}
        ports:
          main:
            enabled: true
            port: 10140
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: paperless.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Paperless-ngx
            description: Document Management
            group: Lifestyle & Home
            widget:
              enabled: false

    persistence:
      data:
        enabled: true
        size: 10Gi
        mountPath: /usr/src/paperless/data
        volsync:
          - name: data
            type: restic
            credentials: s3
            dest:
              enabled: false
              cacheCapacity: 2Gi
            src:
              enabled: true
              cacheCapacity: 2Gi
      media:
        enabled: true
        size: 20Gi
        mountPath: /usr/src/paperless/media
        volsync:
          - name: media
            type: restic
            credentials: s3
            dest:
              enabled: false
              cacheCapacity: 2Gi
            src:
              enabled: true
              cacheCapacity: 2Gi
      consume:
        enabled: true
        size: 5Gi
        mountPath: /usr/src/paperless/consume
      export:
        enabled: true
        size: 5Gi
        mountPath: /usr/src/paperless/export

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0
      pod:
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch

    cnpg:
      main:
        cluster:
          storage:
            size: 5Gi
          # Expanded 2Gi → 8Gi on 2026-05-28 — WAL filled (100%) overnight
          # and caused paperless-ngx to crashloop for 18h waiting on
          # paperless-ngx-cnpg-main-rw:5432 with "Not enough disk space".
          walStorage:
            size: 8Gi

    resources:
      requests:
        cpu: 10m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 2Gi
