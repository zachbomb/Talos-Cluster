# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: ollama
spec:
  releaseName: ollama
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: ollama
      version: 9.24.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      repository: docker.io/ollama/ollama
      pullPolicy: IfNotPresent
      tag: 0.32.3@sha256:ec24bcaa2a810eb74171ce7c517813ef4821ed678988845e8d76cf62467036d4
    rocmImage:
      repository: docker.io/ollama/ollama
      pullPolicy: IfNotPresent
      tag: 0.32.3-rocm@sha256:f613b270ae25c15359712a0a5bf3f749a67c792d113fc1e712fcbf969028d5bc
    uiImage:
      repository: ghcr.io/open-webui/open-webui
      pullPolicy: IfNotPresent
      tag: latest@sha256:a26effeb220e132482bf7e0560b3404843e7bc40d23051144e062960df8df6b0
    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-ollama"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}
    ingress:
      main:
        enabled: true
        hosts:
          - host: ollama.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
            middlewares:
              - name: internal-secure-chain
                namespace: traefik
                expandObjectName: false
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Ollama
            description: AI Language Model
            group: Lifestyle & Home
            widget:
              # Homepage's ollama widget hits the native Ollama API (port 11434),
              # not the OpenWebUI frontend (port 10686). Same OLLAMA_IP serves both
              # via the ollama-api LB service.
              custom:
                url: "http://${OLLAMA_IP}:11434"
              enabled: true
    service:
      main:
        enabled: true
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: ${OLLAMA_IP}
          metallb.io/allow-shared-ip: "ollama"
        ports:
          main:
            enabled: true
            port: 10686
            targetPort: 10686
            protocol: tcp
      api:
        enabled: true
        type: LoadBalancer
        targetSelector: main
        annotations:
          metallb.io/loadBalancerIPs: ${OLLAMA_IP}
          metallb.io/allow-shared-ip: "ollama"
        ports:
          api:
            enabled: true
            port: 11434
            targetPort: 11434
            protocol: tcp
    ollama:
      registration:
        enabled: true
        def_user_role: "pending"
      whisper:
        model: "base"
      rag:
        embedding_engine: "ollama"
        model: "nomic-embed-text"
        model_device_type: "cuda"
    workload:
      main:
        podSpec:
          runtimeClassName: "nvidia"
          containers:
            main:
              imageSelector: image
              env:
                OLLAMA_BIND_ADDRESS: "0.0.0.0"
              probes:
                liveness:
                  enabled: true
                  type: http
                  path: /api/version
                  port: 11434
                readiness:
                  enabled: true
                  type: http
                  path: /api/version
                  port: 11434
                startup:
                  enabled: true
                  type: tcp
                  port: 11434
      ui:
        enabled: true
        type: Deployment
        podSpec:
          containers:
            ui:
              primary: true
              enabled: true
              imageSelector: uiImage
              resources:
                requests:
                  memory: 768Mi
                  cpu: 50m
                limits:
                  memory: 4Gi
                  cpu: "2"
              probes:
                liveness:
                  enabled: true
                  type: http
                  path: /
                  port: 10686
                readiness:
                  enabled: true
                  type: http
                  path: /
                  port: 10686
                startup:
                  enabled: true
                  type: tcp
                  port: 10686
              env:
                PORT: "10686"
                OLLAMA_BASE_URL: "http://${OLLAMA_IP}:11434"
                ENABLE_SIGNUP: "true"
                DEFAULT_USER_ROLE: "pending"
                WHISPER_MODEL: "base"
                RAG_EMBEDDING_ENGINE: "ollama"
                RAG_EMBEDDING_MODEL: "nomic-embed-text"
                RAG_EMBEDDING_MODEL_DEVICE_TYPE: "cuda"
                RAG_SYSTEM_CONTEXT: "true"
                CHUNK_SIZE: "512"
                CHUNK_OVERLAP: "64"
                RAG_TOP_K: "20"
                DATABASE_URL: "postgresql://openwebui:lh0of17euyZs8SOPzSkvEP9wdbxmtqyaKQNEl80dhvhhGRImKgxb4vHThcA8Sa3U@openwebui-db-rw.ollama:5432/openwebui"
                WEBUI_SECRET_KEY:
                  secretKeyRef:
                    name: ollama-secrets
                    key: WEBUI_SECRET_KEY
    configmap:
      tcportal-open:
        enabled: true
        data:
          placeholder: "enabled"
    persistence:
      config:
        enabled: true
        # Bumped 50Gi → 60Gi 2026-06-10 to match the live PVC (had been
        # manually expanded at some point). Helm release was failing with
        # "field can not be less than status.capacity" because helm wanted
        # to set 50Gi while the bound PVC was already 60Gi (Kubernetes
        # rejects PVC shrinks).
        size: 60Gi
        mountPath: /root/.ollama
        volsync:
          - name: config
            type: restic
            credentials: s3
            src:
              enabled: true
              cacheCapacity: 10Gi
              trigger:
                schedule: "4 3 * * *"
            dest:
              enabled: false
              cacheCapacity: 10Gi
      data:
        enabled: true
        size: 5Gi
        mountPath: /app/backend/data
        volsync:
          - name: data
            type: restic
            credentials: s3
            src:
              enabled: true
              cacheCapacity: 3Gi
              trigger:
                schedule: "12 3 * * *"
            dest:
              enabled: false
              cacheCapacity: 3Gi
    autoscaling:
      vpa:
        enabled: true
    resources:
      requests:
        memory: 2Gi
        cpu: 50m
      limits:
        memory: 24Gi
        cpu: "4"
        nvidia.com/gpu: 1
