---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: code-server-ingress
  namespace: code-server
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
    - Ingress
  ingress:
    # Traefik ingress
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
    # Intra-namespace
    - from:
        - podSelector: {}
    # Prometheus metrics scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-prometheus-stack
