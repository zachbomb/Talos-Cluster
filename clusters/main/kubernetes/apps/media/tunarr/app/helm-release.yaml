# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tunarr
  namespace: media
spec:
  interval: 5m
  timeout: 15m
  releaseName: tunarr
  chart:
    spec:
      chart: app-template
      version: 18.14.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      # renovate: datasource=github-releases depName=chrisbenincasa/tunarr extractVersion=^v(?<version>.+)$
      repository: ghcr.io/chrisbenincasa/tunarr
      tag: 1.3.8
      pullPolicy: IfNotPresent
    env:
      TZ: America/Los_Angeles
      TUNARR__TV_DIR: /tv
      TUNARR__MOVIES_DIR: /movies
      TUNARR__MUSIC_DIR: /music
      TUNARR__PORT: "8000"
    workload:
      main:
        args:
          - "--port"
          - "8000"
        podSpec:
          containers:
            main:
              resources:
                requests:
                  memory: 2Gi
                  cpu: 500m
                limits:
                  gpu.intel.com/i915: 1
                  memory: 8Gi
                  cpu: "4"
            cache-purge:
              enabled: true
              image:
                repository: alpine
                tag: "3.24"
              command:
                - /bin/sh
                - -c
                - |
                  echo "Cache purge sidecar started (2m interval; transcode>2m, caches>30m/120m)"
                  while true; do
                    # HLS transcode segments are the runaway growth vector (~8.8GB/hr per active
                    # stream, and streams linger after client disconnect). Purge tightly so
                    # /.transcode stays well under its 5Gi PVC even during heavy channel-surfing.
                    find /.transcode -type f -mmin +2 -delete 2>/dev/null
                    find /.transcode -type d -empty -delete 2>/dev/null
                    # Image/misc caches grow slowly; purge gently to preserve cache hit-rate.
                    find /.cache -type f -mmin +30 -delete 2>/dev/null
                    find /.local -type f -mmin +30 -delete 2>/dev/null
                    find /root/.local/share/tunarr/cache -type f -mmin +120 -delete 2>/dev/null
                    find /.cache -type d -empty -delete 2>/dev/null
                    find /.local -type d -empty -delete 2>/dev/null
                    find /root/.local/share/tunarr/cache -type d -empty -delete 2>/dev/null
                    sleep 120
                  done
              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false
              resources:
                requests:
                  cpu: 5m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                readOnlyRootFilesystem: false
            # Self-healing Plex token: if the Plex media-source can't query Plex
            # (accessToken wiped by a config restore — the Jul 2026 failure mode),
            # re-apply ${PLEX_API} from git via the Tunarr API. Idempotent: only
            # acts when the connection is dead. See memory tunarr-plex-token-recovery.
            token-heal:
              enabled: true
              image:
                repository: python
                tag: "3.14-alpine"
              env:
                - name: PLEX_API
                  value: "${PLEX_API}"
              command:
                - python3
                - -c
                - |
                  import json,os,time,uuid,urllib.request,urllib.error
                  API="http://localhost:8000"; TOKEN=os.environ.get("PLEX_API","")
                  def get(p):
                      try:
                          with urllib.request.urlopen(API+p,timeout=10) as r: return r.status,r.read()
                      except Exception: return None,None
                  def put(p,b):
                      req=urllib.request.Request(API+p,data=json.dumps(b).encode(),method="PUT",headers={"Content-Type":"application/json"})
                      try:
                          with urllib.request.urlopen(req,timeout=15) as r: return r.status
                      except urllib.error.HTTPError as e: return e.code
                      except Exception: return None
                  while True:
                      s,_=get("/api/version")
                      if s==200: break
                      time.sleep(5)
                  print("[token-heal] Tunarr API up",flush=True)
                  while True:
                      s,body=get("/api/media-sources")
                      if s==200 and TOKEN:
                          for src in [x for x in json.loads(body) if x.get("type")=="plex"]:
                              pid=src["id"]; st,_=get("/api/plex/"+pid+"/libraries")
                              if st!=200:
                                  print("[token-heal] plex "+pid+" unhealthy (status="+str(st)+") -> reapplying token",flush=True)
                                  pl=dict(src); pl["accessToken"]=TOKEN
                                  if not pl.get("clientIdentifier"): pl["clientIdentifier"]=str(uuid.uuid4())
                                  print("[token-heal] PUT -> "+str(put("/api/media-sources/"+pid,pl)),flush=True)
                      time.sleep(300)
              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false
              resources:
                requests:
                  cpu: 5m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                readOnlyRootFilesystem: false
    autoscaling:
      vpa:
        enabled: true
        mode: Auto
    scheduling:
      topologyKey: kubernetes.io/hostname
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: tunarr
              topologyKey: kubernetes.io/hostname
    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-tunarr"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}
    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${TUNARR_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${TUNARR_IP}
        ports:
          main:
            enabled: true
            port: 8000
            targetPort: 8000
          codeserver:
            enabled: true
            port: 12321
            targetPort: 12321
    ingress:
      main:
        enabled: true
        hosts:
          - host: tunarr.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
            middlewares:
              - name: internal-secure-chain
                namespace: traefik
                expandObjectName: false
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            icon: https://tunarr.com/assets/tunarr.png
            name: Tunarr
            description: Custom IPTV-like server
            group: Media Players
            widget:
              custom:
                key: ""
              enabled: false
    persistence:
      config:
        enabled: true
        size: 5Gi
        mountPath: /root
        volsync:
          - name: config
            type: restic
            credentials: s3
            src:
              enabled: true
              cacheCapacity: 8Gi
              trigger:
                schedule: "44 3 * * *"
            dest:
              enabled: false
              cacheCapacity: 8Gi
      streams:
        enabled: true
        size: 2Gi
        mountPath: /tunarr/streams
        volsync:
          - name: streams
            type: restic
            credentials: s3
            src:
              enabled: true
              cacheCapacity: 8Gi
              trigger:
                schedule: "0 4 * * *"
            dest:
              enabled: false
              cacheCapacity: 8Gi
      local:
        enabled: true
        size: 5Gi
        mountPath: /root/.local
        volsync:
          - name: local
            type: restic
            credentials: s3
            src:
              enabled: true
              cacheCapacity: 8Gi
              trigger:
                schedule: "52 3 * * *"
            dest:
              enabled: false
              cacheCapacity: 8Gi
      cache:
        enabled: true
        size: 2Gi
        mountPath: /.cache
      local-root:
        enabled: true
        size: 2Gi
        mountPath: /.local
      icache:
        enabled: true
        size: 5Gi
        mountPath: /root/.local/share/tunarr/cache
      msidx:
        enabled: true
        size: 5Gi
        mountPath: /root/.local/share/tunarr/data.ms
      media:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data
        server: 192.168.10.123
        mountPath: /media
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      movies:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data/media/movies
        server: 192.168.10.123
        mountPath: /movies
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      tv:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data/media/tv
        server: 192.168.10.123
        mountPath: /tv
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      music:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data/media/music
        server: 192.168.10.123
        mountPath: /music
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      xmltv:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data/app_backups/DizqueTV_Backups/xmltv
        server: 192.168.10.123
        mountPath: /xmltv
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      dizquetv:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data/app_backups/DizqueTV_Backups/.dizquetv
        server: 192.168.10.123
        mountPath: /.dizquetv
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      backups:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data/app_backups/DizqueTV_Backups/backups
        server: 192.168.10.123
        mountPath: /backups
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      transcoding:
        enabled: true
        size: 5Gi
        mountPath: /.transcode
    securityContext:
      container:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        privileged: true
      pod:
        fsGroup: 0
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 8Gi
        cpu: "4"
    podOptions:
      hostUsers: true
    addons:
      codeserver:
        enabled: true
        service:
          enabled: false # Don't create a separate service
        ingress:
          enabled: true
          targetSelector:
            main: codeserver
          integrations:
            nginx:
              enabled: false
              ingressClassName: internal
            traefik:
              enabled: true
              entrypoints:
                - websecure
            certManager:
              enabled: true
              certificateIssuer: wethecommon-prod-cert
          hosts:
            - host: tunarr-code.${BASE_DOMAIN}
              paths:
                - path: /
                  pathType: Prefix
