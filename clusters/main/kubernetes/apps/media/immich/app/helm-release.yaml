---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: media
spec:
  releaseName: immich
  interval: 15m
  timeout: 20m
  chart:
    spec:
      chart: immich
      version: 27.0.11
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-immich"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}

    immich:
      mlImageType: cudaImage
      enable_ml: true
      enable_typesense: false
      metrics:
        enabled: true

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                IMMICH_TELEMETRY_INCLUDE: "all"
      machinelearning:
        podSpec:
          runtimeClassName: "nvidia"
          containers:
            machinelearning:
              resources:
                requests:
                  cpu: 25m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 4Gi
                  nvidia.com/gpu: 1

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${IMMICH_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${IMMICH_IP}
        ports:
          main:
            enabled: true
            port: 10323
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: photos.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
            middlewares:
              - name: secure-chain
                namespace: traefik
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Immich
            description: Photo Management
            group: Lifestyle & Home
            widget:
              enabled: false

    # Immich data (uploads, thumbs, profile, encoded-video, backups)
    persistence:
      config:
        enabled: true
        size: 20Gi
        mountPath: /usr/src/app/upload
        volsync:
          - name: config
            type: restic
            credentials: s3
            dest:
              enabled: false
            src:
              enabled: true
              cacheCapacity: 5Gi
      # Media NFS (same as Plex/Radarr/Sonarr)
      media:
        enabled: true
        type: nfs
        server: 192.168.10.123
        path: /mnt/Pibbs-Horde/media/data
        mountPath: /media
        mountOptions:
          - nfsvers=4
          - tcp

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsUser: 1000
        runAsGroup: 1000
      pod:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    cnpg:
      main:
        cluster:
          storage:
            size: 5Gi
          walStorage:
            size: 2Gi

    resources:
      requests:
        cpu: 25m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
