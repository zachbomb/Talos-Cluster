---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: media
spec:
  releaseName: immich
  interval: 15m
  timeout: 30m
  chart:
    spec:
      chart: immich
      version: 28.12.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    timeout: 30m
    remediation:
      retries: 0
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 0
  values:
    # Migrated off Bitnami (paid bitnamisecure tier, HTTP 401 on pull) to
    # the official upstream valkey/valkey image (#182). The TrueCharts redis
    # subchart defaults to the bitnami entrypoint + /health probe scripts;
    # valkey/valkey is a plain image, so we override command/args/probes:
    #   - run valkey-server directly with --requirepass (valkey/valkey does
    #     NOT read the bitnami VALKEY_PASSWORD env var)
    #   - --dir /tmp --save "" --appendonly no: pure in-memory cache. immich
    #     uses redis as a BullMQ job queue — losing it on restart just
    #     re-queues jobs, no persistence needed. /tmp is a writable emptyDir
    #     (the image's default /data is owned by UID 999, not the chart's 568).
    #   - probes use valkey-cli -a instead of the bitnami /health scripts.
    redis:
      image:
        repository: docker.io/valkey/valkey
        tag: 8.1.8-alpine
        pullPolicy: IfNotPresent
      workload:
        main:
          podSpec:
            containers:
              main:
                command:
                  - valkey-server
                args:
                  - --requirepass
                  - PLACEHOLDERPASSWORD
                  - --port
                  - "6379"
                  - --dir
                  - /tmp
                  - --save
                  - ""
                  - --appendonly
                  - "no"
                probes:
                  liveness:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]
                  readiness:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]
                  startup:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]

    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-immich"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}

    immich:
      mlImageType: mlImage
      enable_ml: true
      enable_typesense: false
      metrics:
        enabled: true

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                IMMICH_TELEMETRY_INCLUDE: "all"
      machinelearning:
        podSpec:
          containers:
            machinelearning:
              env:
                MPLCONFIGDIR: /tmp/matplotlib
                HF_HOME: /tmp/huggingface
                XDG_CONFIG_HOME: /tmp/config
                XDG_CACHE_HOME: /tmp/cache
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                readOnlyRootFilesystem: false

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${IMMICH_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${IMMICH_IP}
        ports:
          main:
            enabled: true
            port: 10323
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: photos.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Immich
            description: Photo Management
            group: Lifestyle & Home
            widget:
              enabled: false

    persistence:
      backups:
        # Expanded 2026-05-28 2Gi → 4Gi preemptively. Immich postgres db dumps
        # grew to 1.5Gi (74% of 2Gi) — stable but tight headroom.
        size: 4Gi
        mountPath: /usr/src/app/upload/backups
        volsync:
          - name: backups
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true
              cacheCapacity: 2Gi
              trigger:
                schedule: "32 0 * * *"
      library:
        size: 2Gi
        mountPath: /usr/src/app/upload/library
        volsync:
          - name: library
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true
              cacheCapacity: 2Gi
              trigger:
                schedule: "16 0 * * *"
      # Expanded 2026-05-27 from chart-default 100Gi → 250Gi after
      # KubePersistentVolumeFillingUp critical fired (96G/98G, 1.95% free).
      # Thumbs grow with the photo library; revisit when library expansion
      # crosses ~200GiB used.
      thumbs:
        size: 250Gi
        mountPath: /usr/src/app/upload/thumbs
      # Pre-emptively expanded 2026-05-28 from chart-default 100Gi → 200Gi
      # (was at 40Gi/98Gi = 41% — same growth trajectory as thumbs).
      # Encoded-video stores Immich's transcoded HLS streams; grows with
      # video uploads, especially HEIC → H.264 transcodes.
      video:
        size: 200Gi
        mountPath: /usr/src/app/upload/encoded-video
      media:
        enabled: true
        type: nfs
        server: 192.168.10.123
        path: /mnt/Pibbs-Horde/media/data
        mountPath: /media
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
          machinelearning:
            machinelearning: {}

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsUser: 1000
        runAsGroup: 1000
      pod:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    cnpg:
      main:
        cluster:
          storage:
            size: 5Gi
          walStorage:
            size: 2Gi
        backups:
          enabled: true
          credentials: s3
          scheduledBackups:
            - name: daily
              schedule: "0 3 * * *"
              backupOwnerReference: none
              immediate: true
          retentionPolicy: "14d"

    resources:
      requests:
        cpu: 25m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
