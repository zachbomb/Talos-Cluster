---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: media
spec:
  releaseName: immich
  interval: 15m
  timeout: 30m
  chart:
    spec:
      chart: immich
      version: 28.6.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    timeout: 30m
    remediation:
      retries: 0
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 0
  values:
    # Pinned to the cached bitnamisecure/valkey digest (valkey 9.1.0).
    # NOTE: this is Bitnami's PAID Secure tier (HTTP 401 on pull) — it only
    # works because the image is cached on the node. It will break on the
    # next Talos OS upgrade when images re-pull. The bitnamilegacy archive
    # was tried (2026-06-10) but is frozen at valkey 8.1.3, whose older
    # valkey-cli doesn't honor VALKEYCLI_AUTH — the TrueCharts redis-2.3.4
    # health probe fails NOAUTH. Proper fix (#182) needs valkey/valkey
    # upstream with a custom command/args/probe (the ~4-6h migration).
    redis:
      image:
        repository: docker.io/bitnamisecure/valkey
        tag: latest@sha256:5ce04fc20634fa151c6050a3aea9fdf30b709509a27af5af1a379b73d18ad58f
        pullPolicy: IfNotPresent

    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-immich"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}

    immich:
      mlImageType: mlImage
      enable_ml: true
      enable_typesense: false
      metrics:
        enabled: true

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                IMMICH_TELEMETRY_INCLUDE: "all"
      machinelearning:
        podSpec:
          containers:
            machinelearning:
              env:
                MPLCONFIGDIR: /tmp/matplotlib
                HF_HOME: /tmp/huggingface
                XDG_CONFIG_HOME: /tmp/config
                XDG_CACHE_HOME: /tmp/cache
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                readOnlyRootFilesystem: false

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${IMMICH_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${IMMICH_IP}
        ports:
          main:
            enabled: true
            port: 10323
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: photos.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Immich
            description: Photo Management
            group: Lifestyle & Home
            widget:
              enabled: false

    persistence:
      backups:
        # Expanded 2026-05-28 2Gi → 4Gi preemptively. Immich postgres db dumps
        # grew to 1.5Gi (74% of 2Gi) — stable but tight headroom.
        size: 4Gi
        mountPath: /usr/src/app/upload/backups
        volsync:
          - name: backups
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true
              cacheCapacity: 2Gi
      library:
        size: 2Gi
        mountPath: /usr/src/app/upload/library
        volsync:
          - name: library
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true
              cacheCapacity: 2Gi
      # Expanded 2026-05-27 from chart-default 100Gi → 250Gi after
      # KubePersistentVolumeFillingUp critical fired (96G/98G, 1.95% free).
      # Thumbs grow with the photo library; revisit when library expansion
      # crosses ~200GiB used.
      thumbs:
        size: 250Gi
        mountPath: /usr/src/app/upload/thumbs
      # Pre-emptively expanded 2026-05-28 from chart-default 100Gi → 200Gi
      # (was at 40Gi/98Gi = 41% — same growth trajectory as thumbs).
      # Encoded-video stores Immich's transcoded HLS streams; grows with
      # video uploads, especially HEIC → H.264 transcodes.
      video:
        size: 200Gi
        mountPath: /usr/src/app/upload/encoded-video
      media:
        enabled: true
        type: nfs
        server: 192.168.10.123
        path: /mnt/Pibbs-Horde/media/data
        mountPath: /media
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
          machinelearning:
            machinelearning: {}

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsUser: 1000
        runAsGroup: 1000
      pod:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    cnpg:
      main:
        cluster:
          storage:
            size: 5Gi
          walStorage:
            size: 2Gi
        backups:
          enabled: true
          credentials: s3
          scheduledBackups:
            - name: daily
              schedule: "0 3 * * *"
              backupOwnerReference: none
              immediate: true
          retentionPolicy: "14d"

    resources:
      requests:
        cpu: 25m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
