---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: media
spec:
  releaseName: immich
  interval: 15m
  timeout: 30m
  chart:
    spec:
      chart: immich
      version: 27.0.11
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    timeout: 30m
    remediation:
      retries: 0
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 0
  values:
    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-immich"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}

    immich:
      mlImageType: mlImage
      enable_ml: true
      enable_typesense: false
      metrics:
        enabled: true

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                IMMICH_TELEMETRY_INCLUDE: "all"
      machinelearning:
        podSpec:
          containers:
            machinelearning:
              env:
                MPLCONFIGDIR: /tmp/matplotlib
                HF_HOME: /tmp/huggingface
                XDG_CONFIG_HOME: /tmp/config
                XDG_CACHE_HOME: /tmp/cache
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                readOnlyRootFilesystem: false

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${IMMICH_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${IMMICH_IP}
        ports:
          main:
            enabled: true
            port: 10323
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: photos.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Immich
            description: Photo Management
            group: Lifestyle & Home
            widget:
              enabled: false

    persistence:
      backups:
        size: 2Gi
        mountPath: /usr/src/app/upload/backups
        volsync:
          - name: backups
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true
              cacheCapacity: 2Gi
      library:
        size: 2Gi
        mountPath: /usr/src/app/upload/library
        volsync:
          - name: library
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true
              cacheCapacity: 2Gi
      media:
        enabled: true
        type: nfs
        server: 192.168.10.123
        path: /mnt/Pibbs-Horde/media/data
        mountPath: /media
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
          machinelearning:
            machinelearning: {}

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsUser: 1000
        runAsGroup: 1000
      pod:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    cnpg:
      main:
        cluster:
          storage:
            size: 5Gi
          walStorage:
            size: 2Gi
        backups:
          enabled: true
          credentials: s3
          scheduledBackups:
            - name: daily
              schedule: "0 3 * * *"
              backupOwnerReference: none
              immediate: true
          retentionPolicy: "14d"

    resources:
      requests:
        cpu: 25m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
