---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: media
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: immich
      version: 27.0.11
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    immich:
      # CPU-based ML (GPU slots nearly full with Ollama)
      mlImageType: mlImage
      enable_ml: true
      enable_typesense: false

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${IMMICH_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${IMMICH_IP}
        ports:
          main:
            enabled: true
            port: 10323
            protocol: http

    ingress:
      main:
        enabled: true
        hosts:
          - host: photos.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
            middlewares:
              - name: secure-chain
                namespace: traefik
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: Immich
            description: Photo Management
            group: Lifestyle & Home
            widget:
              enabled: false

    # Photo library on NFS (TrueNAS)
    persistence:
      library:
        enabled: true
        type: nfs
        server: 192.168.10.123
        path: /mnt/Pibbs-Horde/media/data/media/Photos
        mountPath: /usr/src/app/upload/library
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      uploads:
        enabled: true
        size: 10Gi
        mountPath: /usr/src/app/upload/upload
      thumbs:
        enabled: true
        size: 10Gi
        mountPath: /usr/src/app/upload/thumbs
      video:
        enabled: true
        size: 5Gi
        mountPath: /usr/src/app/upload/encoded-video
      profile:
        enabled: true
        size: 1Gi
        mountPath: /usr/src/app/upload/profile
      backups:
        enabled: true
        size: 5Gi
        mountPath: /usr/src/app/upload/backups

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsUser: 1000
        runAsGroup: 1000
      pod:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    cnpg:
      main:
        cluster:
          storage:
            size: 5Gi
          walStorage:
            size: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
