apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cwa
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 18.7.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    image:
      repository: crocodilestick/calibre-web-automated
      pullPolicy: Always
      tag: latest
    TZ: America/Los_Angeles
    portal:
      open:
        enabled: false
    global:
      stopAll: false
    credentials:
      s3:
        type: s3
        url: ${S3URL}
        bucket: "${S3PREFIX}-cwa"
        accessKey: ${S3ID}
        secretKey: ${S3KEY}
        encrKey: ${S3KEY}
    ingress:
      main:
        enabled: true
        hosts:
          - host: cwa.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: true
            name: CWA
            description: Calibre Web Automated
            group: Content Management
            icon: ""
            widget:
              # CWA uses the calibre-web-compatible API. TrueCharts app-template
              # chart defaults the widget type to the chart name ("apptemplate"),
              # which Homepage doesn't recognize — explicitly set `type: calibreweb`.
              # Reuses CALIBRE_WEB_API as the password; if CWA has different
              # creds, swap in a new ${CWA_API} var.
              type: calibreweb
              custom:
                # CWA's admin user is 'admin' (zachbomb@gmail.com). The
                # calibre-web-compatible API uses Basic Auth.
                url: http://${CWA_IP}:8083
                username: admin
                password: ${CALIBRE_WEB_API}
              enabled: true
    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: ${CWA_IP}
        annotations:
          metallb.io/loadBalancerIPs: ${CWA_IP}
        ports:
          main:
            port: 8083
            targetPort: 8083
            protocol: http
    persistence:
      config:
        enabled: true
        size: 2Gi
        mountPath: /config
        volsync:
          - name: config
            type: restic
            credentials: s3
            dest:
              enabled: false
              cacheCapacity: 2Gi
            src:
              enabled: true
              cacheCapacity: 2Gi
              trigger:
                schedule: 40 0 * * *
      library:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data/media/books
        server: 192.168.10.123
        mountPath: /calibre-library
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
      ingest:
        enabled: true
        type: nfs
        path: /mnt/Pibbs-Horde/media/data/media/books-ingest
        server: 192.168.10.123
        mountPath: /cwa-book-ingest
        mountOptions:
          - nfsvers=4
          - tcp
          - intr
          - hard
          - noatime
          - nodiratime
          - nolock
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Los_Angeles
      NETWORK_SHARE_MODE: "true"
      TRUSTED_PROXY_COUNT: "1"
    securityContext:
      container:
        runAsUser: 0
        runAsGroup: 0
        readOnlyRootFilesystem: false
      pod:
        fsGroup: 0
    metrics:
      main:
        enabled: false
    resources:
      requests:
        memory: 256Mi
        cpu: 10m
      limits:
        memory: 1Gi
        cpu: 500m
    autoscaling:
      vpa:
        enabled: false
