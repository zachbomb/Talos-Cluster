apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpo
  namespace: mcpo
  labels:
    app.kubernetes.io/name: mcpo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcpo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcpo
    spec:
      containers:
        - name: mcpo
          image: ghcr.io/open-webui/mcpo:latest
          args:
            - "--config"
            - "/config/config.json"
            - "--port"
            - "8000"
            - "--host"
            - "0.0.0.0"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: mcpo-config
