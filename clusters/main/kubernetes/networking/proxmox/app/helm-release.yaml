# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proxmox
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: external-service
      version: 17.1.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: proxmox
  values:
    service:
      main:
        enabled: true
        type: ExternalIP
        externalIP: 192.168.10.30
        integrations:
          traefik:
            enabled: true
            insecureSkipVerify: true
        ports:
          main:
            enabled: true
            protocol: https
            port: 8006
    ingress:
      main:
        enabled: true
        hosts:
          - host: proxmox.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: false
            ingressClassName: internal
          traefik:
            enabled: true
            entrypoints:
              - websecure
          certManager:
            enabled: true
            certificateIssuer: wethecommon-prod-cert
          homepage:
            enabled: false
