---
# ClusterImageCatalog declares (postgres-major → image) so CNPG knows the pg major
# without parsing the image tag (which starts with pgvector version, not pg version).
apiVersion: postgresql.cnpg.io/v1
kind: ClusterImageCatalog
metadata:
  name: pgvector
spec:
  images:
    - major: 18
      image: ghcr.io/cloudnative-pg/pgvector:0.8.1-18-trixie
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: goodmem-db
  namespace: goodmem
spec:
  instances: 1
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: pgvector
    major: 18
  postgresql:
    parameters:
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      max_connections: "100"
    pg_hba:
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/16 md5
  bootstrap:
    initdb:
      database: goodmem
      owner: goodmem_user
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS "vector"
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
        - CREATE EXTENSION IF NOT EXISTS "pgcrypto"
  storage:
    size: 10Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-goodmem/
      endpointURL: ${S3URL}
      s3Credentials:
        accessKeyId:
          name: goodmem-db-s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: goodmem-db-s3-creds
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
  monitoring:
    enablePodMonitor: false
