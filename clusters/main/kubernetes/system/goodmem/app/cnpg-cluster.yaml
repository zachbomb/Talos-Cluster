apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: goodmem-db
  namespace: goodmem
spec:
  instances: 1
  # Tensorchord's CNPG operand image — postgres 17 + pgvector + vchord baked in.
  # Same vendor used by media/immich-cnpg-main, so it's proven in this cluster.
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17-1.1.1
  postgresql:
    parameters:
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      max_connections: "100"
    pg_hba:
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/16 md5
  bootstrap:
    initdb:
      database: goodmem
      owner: goodmem_user
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS "vector"
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
        - CREATE EXTENSION IF NOT EXISTS "pgcrypto"
  storage:
    size: 10Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-goodmem/
      endpointURL: ${S3URL}
      s3Credentials:
        accessKeyId:
          name: goodmem-db-s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: goodmem-db-s3-creds
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
  monitoring:
    enablePodMonitor: false
