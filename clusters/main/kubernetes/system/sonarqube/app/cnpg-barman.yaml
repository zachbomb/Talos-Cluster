---
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-db-s3-creds
  namespace: sonarqube
type: Opaque
stringData:
  ACCESS_KEY_ID: ${S3ID}
  ACCESS_SECRET_KEY: ${S3KEY}
---
# 03:30 daily — staggered from goodmem (03:00) per plan to avoid MinIO contention.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: sonarqube-db-daily
  namespace: sonarqube
spec:
  schedule: "30 3 * * *"
  backupOwnerReference: self
  cluster:
    name: sonarqube-db
  method: barmanObjectStore
  target: prefer-standby
