---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sonarqube
  namespace: flux-system
spec:
  interval: 10m
  path: clusters/main/kubernetes/system/sonarqube/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
  dependsOn:
    - name: cloudnative-pg
    - name: longhorn
