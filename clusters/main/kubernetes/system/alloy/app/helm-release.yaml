---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: loki
spec:
  interval: 15m
  chart:
    spec:
      chart: alloy
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    alloy:
      configMap:
        content: |
          // Discover all Kubernetes pods
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Relabel pod metadata for log labels
          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
          }

          // Collect pod logs
          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.process.pods.receiver]
          }

          // Process logs — add labels, drop debug noise
          loki.process "pods" {
            stage.static_labels {
              values = {
                cluster = "cluster_main",
              }
            }

            // Drop high-volume debug logs from noisy namespaces
            stage.drop {
              source     = "namespace"
              expression = "(longhorn-system|kube-system)"
              older_than = "1h"
            }

            forward_to = [loki.write.default.receiver]
          }

          // Ship logs to Loki
          loki.write "default" {
            endpoint {
              url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
            }
          }

    # Run as DaemonSet to collect logs from all nodes
    controller:
      type: daemonset

    serviceMonitor:
      enabled: true
      interval: 1m

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
