---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: loki
spec:
  interval: 15m
  chart:
    spec:
      chart: alloy
      version: 1.9.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    alloy:
      configMap:
        content: |
          // Discover all Kubernetes pods
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Relabel pod metadata for log labels
          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
          }

          // Collect pod logs
          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.process.pods.receiver]
          }

          // Process logs — add labels, drop debug noise
          loki.process "pods" {
            stage.static_labels {
              values = {
                cluster = "cluster_main",
              }
            }

            // Drop high-volume debug logs from noisy namespaces
            stage.drop {
              source     = "namespace"
              expression = "(longhorn-system|kube-system)"
              older_than = "1h"
            }

            forward_to = [loki.write.default.receiver]
          }

          // Scrape kube-apiserver audit log mounted from the host.
          // Audit policy logs Metadata level for secrets — who/when/which-secret,
          // NOT cleartext credentials. Source: Talos patch audit-policy.yaml.
          loki.source.file "audit" {
            targets = [{
              __path__ = "/var/log/audit/audit.log",
              job      = "kube-audit",
            }]
            forward_to = [loki.process.audit.receiver]
          }

          // Extract verb/user/resource/namespace/name fields from each
          // audit event JSON line. Promotes them to Loki labels so we can
          // query e.g. {audit_resource="secrets", audit_verb="get"}.
          loki.process "audit" {
            stage.json {
              expressions = {
                verb      = "verb",
                user      = "user.username",
                resource  = "objectRef.resource",
                namespace = "objectRef.namespace",
                name      = "objectRef.name",
              }
            }
            stage.labels {
              values = {
                audit_verb     = "",
                audit_user     = "",
                audit_resource = "",
              }
            }
            forward_to = [loki.write.default.receiver]
          }

          // Ship logs to Loki
          loki.write "default" {
            endpoint {
              url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
            }
          }

      # Mount the host audit log path read-only into every Alloy DaemonSet pod.
      # Requires the loki namespace to carry pod-security.kubernetes.io/enforce=privileged
      # because hostPath is forbidden under the baseline PodSecurity profile.
      mounts:
        extra:
          - name: kube-audit
            mountPath: /var/log/audit
            readOnly: true

    # Run as DaemonSet to collect logs from all nodes
    controller:
      type: daemonset
      volumes:
        extra:
          - name: kube-audit
            hostPath:
              # Talos writes audit logs here (audit-policy.yaml patch sets
              # the apiserver --audit-log-path to /var/log/audit/audit.log
              # INSIDE the apiserver pod, which is bind-mounted from this
              # host path). The original /var/log/audit path worked, but
              # /var/log/k8s-audit avoids any collision with system auditd
              # (Talos's auditd service writes to /var/log/audit/* on the
              # host too).
              path: /var/log/k8s-audit
              type: DirectoryOrCreate

    serviceMonitor:
      enabled: true
      interval: 1m

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
