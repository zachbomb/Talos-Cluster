---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# TrueNAS metrics via Graphite protocol:
#   1. Deploy this exporter (receives Graphite on port 9109, exposes Prometheus on 9108)
#   2. In TrueNAS UI: System > Reporting > set Remote Graphite Server to ${GRAPHITE_EXPORTER_IP}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: graphite-exporter
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: prom/graphite-exporter
              tag: v0.16.0
            args:
              - --graphite.listen-address=:9109
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

    service:
      main:
        controller: main
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: "${GRAPHITE_EXPORTER_IP}"
        ports:
          graphite:
            port: 9109
            protocol: TCP
          metrics:
            port: 9108
            protocol: TCP

    serviceMonitor:
      main:
        serviceName: graphite-exporter
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m

    # No mapping config -- graphite-exporter will pass through all metrics
    # with their original Graphite names converted to Prometheus format.
    # TrueNAS pushes Graphite data to port 9109, Prometheus scrapes port 9108.
