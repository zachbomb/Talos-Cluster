apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  timeout: 20m
  maxHistory: 3
  releaseName: longhorn
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: home-ops-mirror
        namespace: flux-system
  values:
    defaultSettings:
      defaultReplicaCount: "1"
      storageOverProvisioningPercentage: "100000"
      guaranteedInstanceManagerCPU: 8
      # Raised 10s→30s during the 2026-06-14 IM crash-loop outage. After a
      # cascade, the instance-manager liveness probe (nc localhost 8500-8503)
      # timed out at 10s while bringing up ~100 engines, so kubelet killed the
      # IM before it could stabilize → permanent death spiral (every ~90s).
      # 30s lets the IM survive the attach storm. Root trigger was the Longhorn
      # 1.11.2→1.12.0 auto-upgrade (#4177, June 2) — Renovate is supposed to be
      # disabled for this chart but the automerge-action bypassed it; re-block.
      instanceManagerPodLivenessProbeTimeout: "30"
      # Enable the revision counter. With it DISABLED (Longhorn's default since
      # 1.2), a single-replica volume that faults on an unclean node reboot will
      # NOT auto-salvage — Longhorn can't confirm the lone replica is consistent,
      # so auto-salvage logs "bringing up 0 replicas" and the volume stays
      # detached/faulted until failedAt is cleared by hand. On 2026-07-03 a Talos
      # reboot faulted ~50 single-replica volumes this way (Longhorn #2309/#7714).
      # On a single-node cluster the lone replica IS the data, so salvaging it is
      # always correct. NOTE: this applies to NEW volumes only; pre-existing
      # volumes keep their setting until rebuilt — see the salvage runbook.
      disableRevisionCounter: false
      # v2DataEngine: true
    persistence:
      defaultClass: true
      defaultClassReplicaCount: "1"
    csi:
      attacherReplicaCount: 2
      provisionerReplicaCount: 2
      resizerReplicaCount: 2
      snapshotterReplicaCount: 2
    longhornUI:
      replicas: 1
    metrics:
      serviceMonitor:
        enabled: true
    service:
      ui:
        type: LoadBalancer
        # MetalLB v0.13+ rejects setting both spec.loadBalancerIP AND the
        # annotation. spec.loadBalancerIP is deprecated in K8s 1.24+;
        # annotation-only is the modern pattern for upstream charts.
        annotations:
          metallb.io/loadBalancerIPs: ${LONGHORN_IP}
        port: 80
