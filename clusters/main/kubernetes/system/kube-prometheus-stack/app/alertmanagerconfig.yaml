---
# AlertmanagerConfig (v1beta1) — cluster-wide alert routing.
#
# Plan: docs/plans/2026-05-07-001-feat-alerting-hitl-framework-plan.md (U3, U10, U16)
# Origin: docs/brainstorms/2026-05-07-cluster-alerting-hitl-requirements.md (R2, R3, R4, R18a)
#
# Design notes:
# - Routes are mutually exclusive (`continue: false` on every leaf) — no double-fanout.
# - Webhook URLs come from `secretKeyRef` (NOT envsubst) — see alertmanager-secret.secret.yaml.
# - Watchdog matcher carries a per-route `groupInterval: 30s` override so the heartbeat
#   webhook is delivered at the rule's evaluation cadence, not the global 5m default.
#   Without this, R18a's claimed 1-min cadence would silently degrade to 5-min.
# - The `hitl-only` receiver and remediation route are added in U16 (when the HITL
#   receiver is deployed). Until then, alerts carrying a `remediation` label fall
#   through to the severity-based routes below.

apiVersion: monitoring.coreos.com/v1beta1
kind: AlertmanagerConfig
metadata:
  name: cluster-routing
  namespace: kube-prometheus-stack
spec:
  route:
    groupBy:
      - alertname
      - severity
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 24h
    # Default leaf — never matched in practice; routes below cover all severities.
    receiver: "null"
    routes:
      # InfoInhibitor: silently swallows InfoInhibitor alerts (chart's internal mechanism).
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
        continue: false

      # Watchdog: per-route groupInterval override delivers heartbeat at 1-min eval
      # cadence (R18a SLO requires ≤5min detection floor). Routes ONLY to the
      # uptime-kuma push endpoint — NEVER to Discord/Notifiarr.
      - receiver: watchdog-uptime-kuma
        matchers:
          - name: watchdog
            value: "true"
            matchType: =
        groupInterval: 30s
        groupWait: 0s
        repeatInterval: 1m
        continue: false

      # Critical, no remediation label — direct Discord webhook (no HITL).
      # The `hitl-only` route for `remediation=~".+"` is added in U16; until then,
      # remediation-labelled criticals also land here.
      - receiver: discord-critical
        matchers:
          - name: severity
            value: critical
            matchType: =
        repeatInterval: 4h
        continue: false

      # Warning — Notifiarr relay for richer formatting.
      - receiver: notifiarr-default
        matchers:
          - name: severity
            value: warning
            matchType: =
        repeatInterval: 12h
        continue: false

      # Info — Loki/Grafana annotations only. No Discord, no Notifiarr.
      - receiver: "null"
        matchers:
          - name: severity
            value: info
            matchType: =
        continue: false

  # Inhibit a warning when the same alertname is firing critical.
  inhibitRules:
    - sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
      equal:
        - alertname
        - namespace

  receivers:
    - name: "null"

    - name: discord-critical
      discordConfigs:
        - sendResolved: true
          apiURL:
            name: alertmanager-secret
            key: discord-critical-url
          title: |-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          message: |-
            {{- range .Alerts }}
              {{- if ne .Annotations.description "" }}
                {{ .Annotations.description }}
              {{- else if ne .Annotations.summary "" }}
                {{ .Annotations.summary }}
              {{- else }}
                Alert: {{ .Labels.alertname }}
              {{- end }}
            {{- end }}

    - name: notifiarr-default
      webhookConfigs:
        - sendResolved: true
          urlSecret:
            name: alertmanager-secret
            key: notifiarr-default-url

    - name: watchdog-uptime-kuma
      webhookConfigs:
        - sendResolved: false
          urlSecret:
            name: alertmanager-secret
            key: watchdog-uptime-kuma-url
