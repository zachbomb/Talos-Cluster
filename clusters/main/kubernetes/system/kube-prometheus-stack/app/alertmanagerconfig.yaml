---
# AlertmanagerConfig (v1alpha1) — cluster-wide alert routing.
# 2026-05-26: dropped from v1beta1 to v1alpha1 — the kube-prometheus-stack
# CRD only serves v1alpha1 now (v1beta1 was removed in a recent chart
# release). Schema for matchers is identical between the two.
#
# Plan: docs/plans/2026-05-07-001-feat-alerting-hitl-framework-plan.md (U3, U10, U16)
# Origin: docs/brainstorms/2026-05-07-cluster-alerting-hitl-requirements.md (R2, R3, R4, R18a)
#
# Design notes:
# - Routes are mutually exclusive (`continue: false` on every leaf) — no double-fanout.
# - Webhook URLs come from `secretKeyRef` (NOT envsubst) — see alertmanager-secret.secret.yaml.
# - Watchdog matcher carries a per-route `groupInterval: 30s` override so the heartbeat
#   webhook is delivered at the rule's evaluation cadence, not the global 5m default.
#   Without this, R18a's claimed 1-min cadence would silently degrade to 5-min.
# - The `hitl-only` receiver and remediation route are added in U16 (when the HITL
#   receiver is deployed). Until then, alerts carrying a `remediation` label fall
#   through to the severity-based routes below.

apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: cluster-routing
  namespace: kube-prometheus-stack
spec:
  route:
    groupBy:
      - alertname
      - severity
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 24h
    # Default leaf — never matched in practice; routes below cover all severities.
    receiver: "null"
    routes:
      # InfoInhibitor: silently swallows InfoInhibitor alerts (chart's internal mechanism).
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: "="
        continue: false

      # Watchdog: per-route groupInterval override delivers heartbeat at 1-min eval
      # cadence (R18a SLO requires ≤5min detection floor). Routes ONLY to the
      # uptime-kuma push endpoint — NEVER to Discord/Notifiarr.
      - receiver: watchdog-uptime-kuma
        matchers:
          - name: watchdog
            value: "true"
            matchType: "="
        groupInterval: 30s
        groupWait: 0s
        repeatInterval: 1m
        continue: false

      # Critical WITH a remediation label → HITL receiver only (single-message
      # UX). The HITL bot post IS the user-facing notification; no separate
      # discordConfigs visual is sent. R18 meta-monitoring catches receiver-down.
      # MUST be ordered BEFORE the bare `severity=critical` route below.
      - receiver: hitl-only
        matchers:
          - name: severity
            value: critical
            matchType: "="
          - name: remediation
            value: .+
            matchType: "=~"
        repeatInterval: 4h
        continue: false

      # Critical without remediation label — route to Notifiarr (which the user's
      # Notifiarr Local client can fan out to Discord/Telegram/etc per its config).
      # 2026-05-26: switched from a direct discord-critical receiver to notifiarr-default
      # because v85 of kube-prometheus-stack adds strict apiURL validation and the
      # discord webhook was a placeholder. Re-add a discord-critical receiver here
      # if a real Discord webhook is configured later.
      - receiver: notifiarr-default
        matchers:
          - name: severity
            value: critical
            matchType: "="
        repeatInterval: 4h
        continue: false

      # Warning — Notifiarr relay for richer formatting.
      - receiver: notifiarr-default
        matchers:
          - name: severity
            value: warning
            matchType: "="
        repeatInterval: 12h
        continue: false

      # Info — Loki/Grafana annotations only. No Discord, no Notifiarr.
      - receiver: "null"
        matchers:
          - name: severity
            value: info
            matchType: "="
        continue: false

  # Inhibit a warning when the same alertname is firing critical.
  inhibitRules:
    - sourceMatch:
        - name: severity
          value: critical
          matchType: "="
      targetMatch:
        - name: severity
          value: warning
          matchType: "="
      equal:
        - alertname
        - namespace

  receivers:
    - name: "null"

    # discord-critical receiver removed 2026-05-26 — placeholder apiURL fails
    # v85 validation. Routing collapsed onto notifiarr-default for now. To re-enable
    # native Discord delivery, restore this receiver and fill in discord-critical-url
    # in alertmanager-secret.secret.yaml:
    #
    # - name: discord-critical
    #   discordConfigs:
    #     - sendResolved: true
    #       apiURL: { name: alertmanager-secret, key: discord-critical-url }
    #       title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
    #       message: ...

    - name: notifiarr-default
      webhookConfigs:
        - sendResolved: true
          urlSecret:
            name: alertmanager-secret
            key: notifiarr-default-url

    - name: watchdog-uptime-kuma
      webhookConfigs:
        - sendResolved: false
          urlSecret:
            name: alertmanager-secret
            key: watchdog-uptime-kuma-url

    # HITL receiver — webhookConfigs only, NO discordConfigs (single-message UX
    # per origin R3 + plan rev-2 dual-fanout decision). The receiver registers
    # Pending state and posts the button-bearing message via the bot API.
    - name: hitl-only
      webhookConfigs:
        - sendResolved: true
          url: http://alert-remediation-hitl.alert-remediation.svc.cluster.local:8080/webhook/hitl
