---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: kube-prometheus-stack
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 86.3.2
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    crds:
      enabled: true
      upgradeJob:
        enabled: true
        forceConflicts: true
    cleanPrometheusOperatorObjectNames: true
    alertmanager:
      enabled: true
      # Override default inhibit_rules to exempt the Watchdog heartbeat from
      # info-severity suppression. Chart's default rules suppress ALL alerts
      # with severity=info (including the always-firing Watchdog heartbeat
      # that's supposed to reach Uptime Kuma every minute). Adding
      # 'watchdog!="true"' to target_matchers preserves the noise suppression
      # for other info alerts but lets the heartbeat through. 2026-05-27.
      config:
        inhibit_rules:
          - source_matchers:
              - 'severity = critical'
            target_matchers:
              - 'severity =~ warning|info'
              - 'watchdog!="true"'
            equal:
              - namespace
              - alertname
          - source_matchers:
              - 'severity = warning'
            target_matchers:
              - 'severity = info'
              - 'watchdog!="true"'
            equal:
              - namespace
              - alertname
          - source_matchers:
              - 'alertname = InfoInhibitor'
            target_matchers:
              - 'severity = info'
              - 'watchdog!="true"'
            equal:
              - namespace
          - target_matchers:
              - 'alertname = InfoInhibitor'
      # U4: internal-only ingress at alert.sf.${BASE_DOMAIN} via Traefik internal-secure-chain.
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.middlewares: traefik-internal-secure-chain@kubernetescrd
          cert-manager.io/cluster-issuer: wethecommon-prod-cert
        hosts:
          - alert.sf.${BASE_DOMAIN}
        paths:
          - /
        pathType: Prefix
        tls:
          - secretName: alertmanager-tls
            hosts:
              - alert.sf.${BASE_DOMAIN}
      alertmanagerSpec:
        # Cluster-wide AlertmanagerConfig discovery — matcher strategy `None`
        # disables the operator's default per-namespace matcher injection so the
        # CRD-rooted route applies as authored. See plan U1 + U3.
        alertmanagerConfigSelector: {}
        alertmanagerConfigMatcherStrategy:
          type: None
        retention: 120h
        replicas: 1
        externalLabels:
          cluster: cluster_main
          env: prod
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
      enabled: true
    kubeProxy:
      enabled: false
    prometheus:
      ingress:
        enabled: false
      prometheusSpec:
        disableCompaction: true
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - memory-snapshot-on-shutdown
        # Prometheus metrics retention time in PV.
        # retentionSize is the WAL+blocks cap Prometheus enforces; keep it
        # below the PVC size so head writes never run out of space. 2026-06-10:
        # PVC 60Gi → 100Gi, retentionSize 50GB → 80GB after WAL filled and
        # CrashLoopBacked off with "no space left on device" on /prometheus/wal.
        retention: 14d
        retentionSize: 80GB
        # External labels to add to any time series or
        # alerts when communicating with external systems
        externalLabels:
          cluster: cluster_main
          env: prod
        # High availability
        replicas: 1
        resources:
          requests:
            cpu: 100m
            memory: 500Mi
          limits:
            memory: 4Gi
            # storageSpec:
            #   volumeClaimTemplate:
            #     spec:
            #       resources:
            #         requests:
            #           storage: 60Gi
        # storageSpec:
        #   volumeClaimTemplate:
        #     spec:
        #       resources:
        #         requests:
        #           storage: 60Gi

        storageSpec:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  # Bumped 60Gi → 100Gi 2026-06-10 after PVC filled.
                  # Prometheus Operator handles online PVC expansion via the
                  # Prometheus CR; underlying StorageClass (longhorn) supports
                  # online expansion.
                  storage: 100Gi
    prometheus-node-exporter:
      fullnameOverride: node-exporter
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: ["__meta_kubernetes_pod_node_name"]
              targetLabel: kubernetes_node
    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      # metricLabelsAllowlist:
      #   - pods=[*]
      #   - deployments=[*]
      #   - persistentvolumeclaims=[*]
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: ["__meta_kubernetes_pod_node_name"]
              targetLabel: kubernetes_node
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]
        - persistentvolumeclaims=[*]
    grafana:
      enabled: true
      forceDeployDashboards: true
      defaultDashboardsEnabled: true
      forceDeployDatasources: true
      adminPassword: admin
      persistence:
        enabled: true
        size: 2Gi
      ingress:
        enabled: true
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.middlewares: traefik-internal-secure-chain@kubernetescrd
          cert-manager.io/cluster-issuer: wethecommon-prod-cert
        hosts:
          - grafana.${BASE_DOMAIN}
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.${BASE_DOMAIN}
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.loki.svc.cluster.local:3100
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 250
      imageRenderer:
        enabled: true
        replicas: 1
        image:
          repository: grafana/grafana-image-renderer
          tag: latest
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
    kubeControllerManager:
      enabled: true
      service:
        port: 10257
        targetPort: 10257
      serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
    kubeScheduler:
      enabled: true
      service:
        port: 10259
        targetPort: 10259
      serviceMonitor:
        enabled: true
        https: true
        insecureSkipVerify: true
    autoscaling:
      vpa:
        enabled: false
