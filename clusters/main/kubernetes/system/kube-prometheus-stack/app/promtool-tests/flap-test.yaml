# promtool test rules — BGP flap-classification rule (U10).
#
# Tests three cases:
#   1. 4 firing edges in 10 min → bgp_flap_active=1 (positive).
#   2. 3 firing edges in 10 min → bgp_flap_active=0 (negative — under threshold).
#   3. 4 edges spread across 31 min → bgp_flap_active=0 at minute 31
#      (negative — window-edge case; the 1st edge has rolled out of [30m]).
#
# The rule under test (recording rule, not alerting rule):
#   bgp_flap_active = (sum_over_time(changes(ALERTS{alertname="BGPSessionDown",alertstate="firing"}[1m])[30m:1m]) >= 4) * 1
#
# We synthesize ALERTS series at firing/resolved transitions to drive the rule.

rule_files:
  - bgp-rules-extracted.yaml  # populated at CI runtime by the workflow's yq extract step

evaluation_interval: 1m

tests:
  - interval: 1m
    name: "Four firing edges in 10 min → flap active"
    input_series:
      # Synthesize ALERTS{alertstate="firing"}: 1 when firing, absent when not.
      # Edge transitions at t=2,4,6,8 (4 firing→absent cycles in a 10-min window).
      - series: 'ALERTS{alertname="BGPSessionDown",alertstate="firing"}'
        values: '_x2 1x1 _x1 1x1 _x1 1x1 _x1 1x1 _x10'
    promql_expr_test:
      - expr: bgp_flap_active
        eval_time: 15m
        exp_samples:
          - labels: 'bgp_flap_active'
            value: 1

  - interval: 1m
    name: "Three firing edges in 10 min → flap NOT active"
    input_series:
      - series: 'ALERTS{alertname="BGPSessionDown",alertstate="firing"}'
        values: '_x2 1x1 _x1 1x1 _x1 1x1 _x12'
    promql_expr_test:
      - expr: bgp_flap_active
        eval_time: 15m
        exp_samples:
          - labels: 'bgp_flap_active'
            value: 0

  - interval: 1m
    name: "Four edges spread across 31 min — window-edge case → flap NOT active at minute 31"
    input_series:
      # Edges at t=1, t=11, t=21, t=31. At minute 31, the t=1 edge is OUTSIDE
      # the [30m] window (window covers t=1+ to t=31), so we count 3 edges,
      # not 4. The flap rule should be inactive.
      - series: 'ALERTS{alertname="BGPSessionDown",alertstate="firing"}'
        values: '_x1 1x1 _x9 1x1 _x9 1x1 _x9 1x1 _x10'
    promql_expr_test:
      - expr: bgp_flap_active
        eval_time: 31m
        exp_samples:
          - labels: 'bgp_flap_active'
            value: 0
