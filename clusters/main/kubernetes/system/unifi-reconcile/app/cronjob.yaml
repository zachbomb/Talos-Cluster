apiVersion: batch/v1
kind: CronJob
metadata:
  name: unifi-reconcile
  namespace: unifi-reconcile
spec:
  # Run daily at 03:15 UTC (8:15 PM PT). Off-peak — reduces chance of touching
  # config while user is actively working in the UI.
  schedule: "15 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reconcile
              image: python:3.12-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: UNIFI_CONTROLLER
                  value: "https://192.168.10.1"
              envFrom:
                - secretRef:
                    name: unifi-reconcile
              volumeMounts:
                - name: desired-state
                  mountPath: /etc/unifi-reconcile
                  readOnly: true
                # pip needs a writable /tmp (readOnlyRootFilesystem: true).
                # Before this volume pip exited with: FileNotFoundError
                # [Errno 2] No usable temporary directory found in
                # ['/tmp', '/var/tmp', '/usr/tmp', '/']
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                runAsUser: 65534
                runAsGroup: 65534
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command:
                - sh
                - -c
                - |
                  pip install --quiet --no-cache-dir --target=/tmp/py pyyaml >/dev/null && \
                  PYTHONPATH=/tmp/py python3 /etc/unifi-reconcile/reconcile.py
          volumes:
            - name: desired-state
              configMap:
                name: unifi-desired-state
                items:
                  - key: desired-state.yaml
                    path: desired-state.yaml
                  - key: reconcile.py
                    path: reconcile.py
                    mode: 0755
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
