---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pve-exporter
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: prompve/prometheus-pve-exporter
              tag: "3.8.3"
            env:
              PVE_USER: "${PVE_USER}"
              PVE_TOKEN_NAME: "${PVE_TOKEN_NAME}"
              PVE_TOKEN_VALUE: "${PVE_TOKEN_VALUE}"
              PVE_VERIFY_SSL: "false"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 9221

    serviceMonitor:
      main:
        serviceName: pve-exporter
        endpoints:
          - port: http
            scheme: http
            path: /pve
            interval: 1m
            scrapeTimeout: 30s
            params:
              target:
                - "192.168.10.30"
              module:
                - "default"
