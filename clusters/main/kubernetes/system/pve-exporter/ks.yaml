apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pve-exporter
  namespace: flux-system
spec:
  dependsOn:
    - name: longhorn
  interval: 10m
  path: clusters/main/kubernetes/system/pve-exporter/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
