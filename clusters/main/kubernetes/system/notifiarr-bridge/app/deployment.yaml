apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifiarr-bridge
  namespace: notifiarr-bridge
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: notifiarr-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifiarr-bridge
      annotations:
        # Roll on script change
        checksum/script: "v2"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python3", "/app/bridge.py"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: notifiarr-bridge
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: script
          configMap:
            name: notifiarr-bridge-script
            items:
              - key: bridge.py
                path: bridge.py
