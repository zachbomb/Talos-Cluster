---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: alert-remediation
  namespace: flux-system
spec:
  interval: 10m
  path: clusters/main/kubernetes/system/alert-remediation/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
  dependsOn:
    - name: kube-prometheus-stack
