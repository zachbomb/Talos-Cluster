---
# NetworkPolicy on alert-remediation namespace — closes the rev-2 finding
# that any cluster pod could otherwise bypass Traefik/CrowdSec/WAF and
# POST directly to the receiver Service. Only Traefik (Discord callbacks)
# and kube-prometheus-stack (AM webhookConfigs) may reach port 8080.
#
# Egress is unrestricted — receiver must reach AM, K8s API, Discord, ghcr.io.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alert-remediation-hitl-ingress
  namespace: alert-remediation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alert-remediation-hitl
  policyTypes:
    - Ingress
  ingress:
    # Traefik → /interactions (Discord callbacks) + /health probes
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8080
          protocol: TCP
    # Alertmanager → /webhook/<receiver> (HITL register)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-prometheus-stack
      ports:
        - port: 8080
          protocol: TCP
    # Prometheus scrape of /metrics (also from kube-prometheus-stack ns)
    # — collapsed into the second rule above since the source namespace is
    # the same. ServiceMonitor selectors handle the pod targeting.
