---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: alert-remediation-hitl
  namespace: alert-remediation
  labels:
    app.kubernetes.io/name: alert-remediation-hitl
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alert-remediation-hitl
  namespaceSelector:
    matchNames:
      - alert-remediation
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
