# UDM-SE SSH private key — separate Secret resource so the BGP-recovery
# playbook ServiceAccount can scope `secrets/get` to ONLY this resource.
# Per origin R21 + rev-2 RBAC blast-radius finding.
#
# Generate the keypair:
#   ssh-keygen -t ed25519 -f /tmp/hitl-udm -N ""
#   # Install the .pub on UDM-SE under a dedicated unprivileged user with
#   # authorized_keys entry:
#   #   command="/data/on_boot.d/15-cluster-bgp.sh",no-port-forwarding,no-X11-forwarding,no-agent-forwarding,no-pty,restrict <pubkey>
#   # Then paste the contents of /tmp/hitl-udm into udm-ssh-private-key below.
