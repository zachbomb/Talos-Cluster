---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: traefik-ingress
  namespace: traefik
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
    - Ingress
  ingress:
    # External traffic from any source
    # Upstream traefik chart uses container ports 8000 (web), 8443 (websecure)
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 8000
          protocol: TCP
        - port: 8443
          protocol: TCP
        - port: 9001
          protocol: TCP
    # Dashboard/metrics from LAN and cluster only
    - from:
        - ipBlock:
            cidr: 192.168.3.0/24
        - ipBlock:
            cidr: 192.168.8.0/24
        - ipBlock:
            cidr: 192.168.9.0/24
        - ipBlock:
            cidr: 192.168.10.0/24
        - ipBlock:
            cidr: 192.168.20.0/24
        - ipBlock:
            cidr: 192.168.30.0/24
        - ipBlock:
            cidr: 172.16.0.0/16
        - ipBlock:
            cidr: 172.17.0.0/16
      ports:
        - port: 8080
          protocol: TCP
        - port: 9000
          protocol: TCP
    # Prometheus metrics scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-prometheus-stack
    # Uptime Kuma health checks (namespace: monitoring)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
