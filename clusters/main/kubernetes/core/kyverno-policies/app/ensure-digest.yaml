## This Can be enabled in the kustomization.yaml file.
## Please note not every chart or application is compatible with this behavior
## Primarily operators spinning their own pods, might include conflicting validation
## Add manual exclusions where needed
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: resolve-image-to-digest
  annotations:
    policies.kyverno.io/title: Resolve Image to Digest
    policies.kyverno.io/category: Other
    policies.kyverno.io/severity: medium
    kyverno.io/kyverno-version: 1.6.0
    policies.kyverno.io/minversion: 1.6.0
    kyverno.io/kubernetes-version: "1.23"
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Image tags are mutable and the change of an image can result in the same tag.
      This policy resolves the image digest of each image in a container and replaces
      the image with the fully resolved reference which includes the digest rather than tag.
spec:
  # failurePolicy: Ignore so this policy doesn't block pod creation
  # cluster-wide when Kyverno itself is starting up (cold-start deadlock).
  # When Kyverno is healthy, the policy applies normally to all new pods.
  # When Kyverno is unreachable (e.g. during cluster reboot), pods can still
  # be created — they just won't have image digests resolved until the next
  # rollout. Acceptable trade-off for cold-start resilience on a single-node
  # cluster. See 2026-05-26 incident.
  failurePolicy: Ignore
  background: false
  rules:
  - name: resolve-to-digest
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
        any:
          - resources:
              kinds:
                - Pod
              name: '*cnpg*'
          - resources:
              kinds:
                - Pod
              name: 'chrome-cdp*'
          - resources:
              kinds:
                - Pod
              name: 'tandoor-recipes*'
          - resources:
              kinds:
                - Pod
              namespaces:
                - longhorn-system
          - resources:
              kinds:
                - Pod
              selector:
                matchLabels:
                  cnpg.io/podRole: instance
    preconditions:
      all:
      - key: "{{request.operation || 'BACKGROUND'}}"
        operator: NotEquals
        value: DELETE
    mutate:
      foreach:
      - list: "request.object.spec.containers"
        context:
          - name: resolvedRef
            imageRegistry:
              reference: "{{ element.image }}"
              jmesPath: "resolvedImage"
              imageRegistryCredentials:
                secrets:
                  - regcred-dockerhub
        patchStrategicMerge:
          spec:
            containers:
            - name: "{{ element.name }}"
              image: "{{ resolvedRef }}"
