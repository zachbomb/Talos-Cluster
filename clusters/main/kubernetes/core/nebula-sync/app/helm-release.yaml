---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Nebula Sync keeps Pi-hole configs synchronized between instances.
# PRIMARY = bare-metal Pi-hole (.3), REPLICAS = K8s Pi-hole (.244)
# Format: "http://host|password" or "http://host:port|password"
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nebula-sync
  namespace: networking
spec:
  releaseName: nebula-sync
  interval: 15m
  timeout: 20m
  chart:
    spec:
      chart: nebula-sync
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                PRIMARY: "http://192.168.10.3|${PIHOLE_BARE_METAL_PASS}"
                REPLICAS: "http://${PIHOLE_K8S_IP}|${PIHOLE_K8S_PASS}"
                CRON: "*/15 * * * *"
                CLIENT_SKIP_TLS_VERIFICATION: "true"
                SYNC_CONFIG_DNS: "true"
                SYNC_CONFIG_DHCP: "false"
                SYNC_CONFIG_NTP: "false"
                SYNC_CONFIG_RESOLVER: "false"
                SYNC_CONFIG_DATABASE: "false"
                SYNC_CONFIG_MISC: "false"
                SYNC_GRAVITY_ADLISTS: "true"
                SYNC_GRAVITY_DOMAINLISTS: "true"
                SYNC_GRAVITY_CLIENTS: "false"
                SYNC_GRAVITY_GROUPS: "true"

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
