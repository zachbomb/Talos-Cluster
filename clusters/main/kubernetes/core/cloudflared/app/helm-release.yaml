apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  interval: 5m
  chart:
    spec:
      chart: cloudflared
      version: 16.9.3
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  values:
    portal:
      open:
        enabled: false

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                TUNNEL_TOKEN: "${CLOUDFLARE_TOKEN}"
                TUNNEL_METRICS: "0.0.0.0:2000"
                # QUIC (default) tears the tunnel down on brief WAN egress blips
                # ("no recent network activity") — all 4 conns dropped together
                # ~2x/hr, causing external-access loss. http2 (TCP) rides through
                # a ~10s blip instead of reconnecting. See UDM WAN1-failover /
                # #158 investigation, 2026-07.
                TUNNEL_TRANSPORT_PROTOCOL: "http2"

    service:
      main:
        enabled: true
        primary: true
        type: ClusterIP
        ports:
          main:
            enabled: true
            port: 2000
            targetPort: 2000
            protocol: tcp
      metrics:
        enabled: true
        type: ClusterIP
        ports:
          metrics:
            enabled: true
            port: 2000
            targetPort: 2000
            protocol: tcp

    metrics:
      main:
        enabled: true
        type: servicemonitor
        targetSelector: metrics
        endpoints:
          - path: /metrics
            port: metrics
        prometheusRule:
          enabled: false

    securityContext:
      container:
        runAsUser: 1000
        runAsGroup: 1000
        UMASK: "0022"
      pod:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    resources:
      requests:
        memory: 128Mi
        cpu: 10m
      limits:
        memory: 512Mi
        cpu: 500m

    podOptions:
      hostUsers: true
