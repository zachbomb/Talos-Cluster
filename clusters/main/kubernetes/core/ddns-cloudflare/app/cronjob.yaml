apiVersion: batch/v1
kind: CronJob
metadata:
  name: cloudflare-ddns
  namespace: ddns-cloudflare
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: ddns
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: cloudflare-ddns
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                runAsUser: 65534
                runAsGroup: 65534
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  apk add --no-cache curl jq >/dev/null 2>&1 || true
                  CURRENT_IP=$(curl -fsS https://ifconfig.me 2>/dev/null || curl -fsS https://api.ipify.org)
                  if [ -z "$CURRENT_IP" ]; then
                    echo "ERROR: could not determine WAN IP"
                    exit 1
                  fi
                  DNS_IP=$(curl -fsS "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
                    -H "Authorization: Bearer ${CF_TOKEN}" | jq -r '.result.content')
                  if [ "$CURRENT_IP" = "$DNS_IP" ]; then
                    echo "$(date -u +%FT%TZ) ${RECORD_NAME} unchanged at ${CURRENT_IP}"
                    exit 0
                  fi
                  echo "$(date -u +%FT%TZ) ${RECORD_NAME} changed: ${DNS_IP} -> ${CURRENT_IP}"
                  RESULT=$(curl -fsS -X PATCH \
                    "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
                    -H "Authorization: Bearer ${CF_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"content\":\"${CURRENT_IP}\",\"ttl\":300}")
                  SUCCESS=$(echo "$RESULT" | jq -r '.success')
                  if [ "$SUCCESS" = "true" ]; then
                    echo "$(date -u +%FT%TZ) updated ${RECORD_NAME} -> ${CURRENT_IP}"
                  else
                    echo "$(date -u +%FT%TZ) ERROR: $RESULT"
                    exit 1
                  fi
