---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb-config
  namespace: metallb-config
spec:
  interval: 15m
  chart:
    spec:
      chart: metallb-config
      version: 10.2.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # L2Advertisements RESTORED 2026-05-05 after Proxmox host reboot
    # exposed the proxy_arp_pvlan architecture flaw: Linux's proxy ARP
    # is all-or-nothing — with pvlan=1, UDM answered ARP for ALL IPs it
    # had routes to (including the cluster node .89 and VIP .167),
    # which intercepted control-plane traffic. With pvlan=0, BGP-only
    # LB IPs are unreachable from same-subnet LAN clients.
    #
    # Proper fix (TODO): Cilium L2 Announcements — node answers ARP via
    # eBPF, integrates cleanly with kubeProxyReplacement+BGP.
    # Until then: BGP advertisement remains active for off-subnet
    # visibility, MetalLB L2 handles same-subnet ARP.
    L2Advertisements:
      - name: main
        addressPools:
          - main
    ipAddressPools:
      - name: main
        autoAssign: false
        avoidBuggyIPs: true
        addresses:
          - ${METALLB_RANGE}
      # BGP-only pilot pool — keeps .192 reserved for future "BGP-only
      # by intention" experiments. Functionally identical to main now
      # that L2Advertisements are gone, but kept as a marker.
      - name: bgp-pilot
        autoAssign: false
        avoidBuggyIPs: false
        addresses:
          - 192.168.10.192/32