---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb-config
  namespace: metallb-config
spec:
  interval: 15m
  chart:
    spec:
      chart: metallb-config
      version: 10.6.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # L2Advertisements REMOVED 2026-05-05 (U5b.4) — Cilium L2 Announcements
    # now answer ARP for LB IPs from the cluster node via eBPF datapath
    # without kube-proxy SNAT. Real LAN client IPs are preserved at
    # backend pods (verified via U5b.3 pilot: uptime-kuma at .192 saw
    # 192.168.10.154 in [SOCKET] logs).
    #
    # MetalLB still handles IPAM (the IPAddressPool below); only L2 ARP
    # responsibility moved to Cilium. BGP continues for off-subnet/VPN
    # clients that route via UDM-SE.
    ipAddressPools:
      - name: main
        autoAssign: false
        avoidBuggyIPs: true
        addresses:
          - ${METALLB_RANGE}
      # BGP-only pilot pool — keeps .192 reserved for future "BGP-only
      # by intention" experiments. Functionally identical to main now
      # that L2Advertisements are gone, but kept as a marker.
      - name: bgp-pilot
        autoAssign: false
        avoidBuggyIPs: false
        addresses:
          - 192.168.10.192/32