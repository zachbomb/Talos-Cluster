---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb-config
  namespace: metallb-config
spec:
  interval: 15m
  chart:
    spec:
      chart: metallb-config
      version: 10.2.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    L2Advertisements:
      - name: main
        addressPools:
          - main
    ipAddressPools:
      - name: main
        autoAssign: false
        avoidBuggyIPs: true
        addresses:
          - ${METALLB_RANGE}
      # BGP-only pool — IPs assigned from this pool are NOT L2-announced
      # (no L2Advertisement references it); they're only reachable via
      # Cilium BGP advertisement to UDM-SE. Used for the BGP cutover
      # pilot (U4) and any service we want exclusively on BGP.
      - name: bgp-pilot
        autoAssign: false
        avoidBuggyIPs: false
        addresses:
          - 192.168.10.192/32