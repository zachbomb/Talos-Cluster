---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb-config
  namespace: metallb-config
spec:
  interval: 15m
  chart:
    spec:
      chart: metallb-config
      version: 10.2.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # L2Advertisements removed 2026-05-05 (U5 cutover). Cilium BGP now
    # advertises every active LB IP as /32 to UDM-SE; UDM has
    # proxy_arp_pvlan=1 on br0, so it answers ARP for those /32s for
    # same-subnet LAN clients. See:
    #   docs/network/udm-se-bgp.md
    #   docs/network/udm-se/15-cluster-bgp.sh (UDM persistence)
    ipAddressPools:
      - name: main
        autoAssign: false
        avoidBuggyIPs: true
        addresses:
          - ${METALLB_RANGE}
      # BGP-only pilot pool — keeps .192 reserved for future "BGP-only
      # by intention" experiments. Functionally identical to main now
      # that L2Advertisements are gone, but kept as a marker.
      - name: bgp-pilot
        autoAssign: false
        avoidBuggyIPs: false
        addresses:
          - 192.168.10.192/32