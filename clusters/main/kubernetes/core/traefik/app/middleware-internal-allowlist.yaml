---
# IP allowlist for internal-only services.
# Excludes pod/service CIDRs (172.16/16, 172.17/16) so cloudflared-tunneled
# traffic can't impersonate "local" — only LAN/VPN/Travel client IPs pass.
#
# Requires Traefik forwardedHeaders.trustedIPs + proxyProtocol.trustedIPs
# to actually see the real client IP. Without those, this middleware
# evaluates against the SNAT'd source IP which would be wrong.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: internal-allowlist
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 192.168.10.0/24   # LAN
      - 192.168.20.0/24   # other VLAN
      - 192.168.30.0/24   # IoT (allow if you want admin UIs reachable from there)
      - 192.168.3.0/24    # WireGuard VPN
      - 192.168.8.0/24    # Travel
      - 192.168.9.0/24    # Travel
    ipStrategy:
      # excludedIPs strips known proxy hops (cloudflared pod CIDR) from the
      # XFF chain, then evaluates the next IP up. For direct LAN clients
      # with no XFF header, Traefik falls back to the connection's remote
      # address (the real client IP). This handles both:
      #   - Direct LAN: no XFF → uses RemoteAddr (e.g. 192.168.10.154) ✓
      #   - Cloudflare tunnel: XFF=<ext>,172.16.0.62 → excludes pod IP →
      #     evaluates <ext> (will be rejected unless in 192.168.x.x) ✓
      # depth: 1 alone failed for LAN clients — Traefik uses XFF only when
      # the field is set, and direct connections don't set it.
      excludedIPs:
        - 172.16.0.0/16   # pod CIDR (cloudflared, all in-cluster intermediaries)
        - 172.17.0.0/16   # service CIDR
