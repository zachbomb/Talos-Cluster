apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: local-whitelist
  namespace: traefik
spec:
  ipAllowList:
    sourceRange:
      - 172.16.0.0/16
      - 172.17.0.0/16
      - 192.168.10.0/24
      - 192.168.20.0/24
      - 192.168.30.0/24
      - 192.168.3.0/24
      - 192.168.9.0/24
      - 192.168.8.0/24
