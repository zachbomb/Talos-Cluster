apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  chart:
    spec:
      chart: traefik
      # renovate: datasource=helm depName=traefik registryUrl=https://traefik.github.io/charts
      version: 39.0.9
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    deployment:
      enabled: true
      replicas: 1

    service:
      enabled: true
      type: LoadBalancer
      annotations:
        metallb.io/loadBalancerIPs: ${TRAEFIK_IP}
      spec:
        externalTrafficPolicy: Cluster

    logs:
      general:
        level: INFO
      access:
        enabled: true
        format: json

    ingressClass:
      enabled: true
      isDefaultClass: true

    tlsOptions:
      default:
        minVersion: VersionTLS12
        maxVersion: VersionTLS13
        sniStrict: true

    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
        allowExternalNameServices: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true

    tlsStore:
      default:
        defaultCertificate:
          secretName: certificate-issuer-wethecommon-wildcard-cert

    ports:
      traefik:
        expose:
          default: true
      web:
        expose:
          default: true
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        expose:
          default: true
        exposedPort: 443
        http:
          tls:
            enabled: true
          middlewares:
            - traefik-bouncer@kubernetescrd

    metrics:
      prometheus:
        serviceMonitor:
          enabled: true

    experimental:
      plugins:
        bouncer:
          moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
          version: v1.5.1

    resources:
      requests:
        cpu: 10m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
