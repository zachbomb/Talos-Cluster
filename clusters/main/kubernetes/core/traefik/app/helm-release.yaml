apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  chart:
    spec:
      chart: traefik
      # renovate: datasource=helm depName=traefik registryUrl=https://traefik.github.io/charts
      version: 39.0.9
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    deployment:
      enabled: true
      replicas: 1

    service:
      enabled: true
      type: LoadBalancer
      annotations:
        metallb.io/loadBalancerIPs: ${TRAEFIK_IP}
        # PROXY protocol header forwards real client IP from MetalLB to Traefik.
        # Pairs with `proxyProtocol.trustedIPs` on the websecure entrypoint below.
        # Without this, LAN client IPs are SNAT'd to node IPs by kube-proxy
        # (externalTrafficPolicy=Cluster) and become invisible to allowlist middleware.
        metallb.io/use-proxy-protocol: "true"
      spec:
        externalTrafficPolicy: Cluster

    logs:
      general:
        level: INFO
      access:
        enabled: true
        format: json

    ingressClass:
      enabled: true
      isDefaultClass: true

    tlsOptions:
      default:
        minVersion: VersionTLS12
        maxVersion: VersionTLS13
        sniStrict: true

    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
        allowExternalNameServices: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true

    tlsStore:
      default:
        defaultCertificate:
          secretName: certificate-issuer-wethecommon-wildcard-cert

    ports:
      traefik:
        expose:
          default: true
      web:
        expose:
          default: true
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        expose:
          default: true
        exposedPort: 443
        # Trust X-Forwarded-For/CF-Connecting-IP from cloudflared pod IPs and
        # node IPs so middleware (CrowdSec bouncer, IP allowlists) can see the
        # real client IP for tunneled traffic.
        forwardedHeaders:
          trustedIPs:
            - 172.16.0.0/16    # pod CIDR (cloudflared)
            - 172.17.0.0/16    # service CIDR
            - 192.168.10.0/24  # LAN (Traefik node, MetalLB)
        # Accept PROXY protocol from MetalLB so LAN client IPs are preserved
        # past kube-proxy's SNAT.
        proxyProtocol:
          trustedIPs:
            - 172.16.0.0/16
            - 172.17.0.0/16
            - 192.168.10.0/24
        http:
          tls:
            enabled: true
          middlewares:
            - traefik-bouncer@kubernetescrd

    metrics:
      prometheus:
        serviceMonitor:
          enabled: true

    experimental:
      plugins:
        bouncer:
          moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
          version: v1.5.1

    resources:
      requests:
        cpu: 10m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
