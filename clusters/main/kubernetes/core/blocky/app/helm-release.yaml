---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: blocky
spec:
  interval: 15m
  chart:
    spec:
      chart: blocky
      version: 21.1.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false
    service:
      dns:
        externalTrafficPolicy: Local
        loadBalancerIP: ${BLOCKY_IP}
        type: LoadBalancer
        integrations:
          metallb:
            enabled: true
    workload:
      main:
        replicas: 1
    blocking:
      clientGroupsBlock: []
    k8sgateway:
      domains:
        - domain: ${DOMAIN_0}
          dnsChallenge:
            enabled: false
            domain: dns01.clouddns.com
    defaultUpstreams:
      - "https://1.1.1.1/dns-query"
    customDNS:
      customTTL: 1h
      filterUnmappedTypes: true
      rewrite: []
      mapping:
        - domain: sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: proxy.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: traefik.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: external.sf.wethecommon.com
          dnsserver: 192.168.10.194
        - domain: zachstudio.sf.wethecommon.com
          dnsserver: 192.168.10.194
        - domain: traefik-dashboard.local.wethecommon.com
          dnsserver: 192.168.10.4
        - domain: pihole.lan
          dnsserver: 192.168.10.3
        - domain: pihole-k8s.lan
          dnsserver: 192.168.10.244
        - domain: proxmox.lan
          dnsserver: 192.168.10.30
        - domain: talos.lan
          dnsserver: 192.168.10.89
        - domain: nvr.lan
          dnsserver: 192.168.10.100
        - domain: roon.lan
          dnsserver: 192.168.10.102
        - domain: truenas.lan
          dnsserver: 192.168.10.122
        - domain: homebridge.lan
          dnsserver: 192.168.10.190
        - domain: homeassistant.lan
          dnsserver: 192.168.10.191
        - domain: altpi.lan
          dnsserver: 192.168.10.10
        - domain: appletv-livingroom.lan
          dnsserver: 192.168.10.145
        - domain: appletv-guestbedroom.lan
          dnsserver: 192.168.10.150
        - domain: zach-desktop.lan
          dnsserver: 192.168.10.154
        - domain: dns.lan
          dnsserver: 192.168.10.2
    bootstrapDns:
      ips: []
      upstream: "1.1.1.1"
    queryLog:
      type: ""
    configmap:
      dashboard:
        enabled: false
      datasource:
        enabled: false
    cnpg:
      main:
        enabled: false
    metrics:
      main:
        enabled: true
    autoscaling:
      vpa:
        enabled: false
    resources:
      requests:
        memory: 200Mi
        cpu: 20m
      limits:
        memory: 1Gi
        cpu: 500m
