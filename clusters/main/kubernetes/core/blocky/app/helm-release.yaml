---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: blocky
spec:
  interval: 15m
  chart:
    spec:
      chart: blocky
      version: 21.1.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false
    service:
      dns:
        externalTrafficPolicy: Local
        loadBalancerIP: ${BLOCKY_IP}
        type: LoadBalancer
        integrations:
          metallb:
            enabled: true
    workload:
      main:
        replicas: 1
    blocking:
      clientGroupsBlock: []
    k8sgateway:
      domains:
        - domain: ${DOMAIN_0}
          dnsChallenge:
            enabled: false
            domain: dns01.clouddns.com
    defaultUpstreams:
      - "https://1.1.1.1/dns-query"
    customDNS:
      customTTL: 1h
      filterUnmappedTypes: true
      mapping:
        sf.wethecommon.com: 192.168.10.196
        proxy.sf.wethecommon.com: 192.168.10.196
        traefik.sf.wethecommon.com: 192.168.10.196
        external.sf.wethecommon.com: 192.168.10.194
        zachstudio.sf.wethecommon.com: 192.168.10.194
        traefik-dashboard.local.wethecommon.com: 192.168.10.4
        pihole.lan: 192.168.10.3
        pihole-k8s.lan: 192.168.10.244
        proxmox.lan: 192.168.10.30
        talos.lan: 192.168.10.89
        nvr.lan: 192.168.10.100
        roon.lan: 192.168.10.102
        truenas.lan: 192.168.10.122
        homebridge.lan: 192.168.10.190
        homeassistant.lan: 192.168.10.191
        altpi.lan: 192.168.10.10
        appletv-livingroom.lan: 192.168.10.145
        appletv-guestbedroom.lan: 192.168.10.150
        zach-desktop.lan: 192.168.10.154
        dns.lan: 192.168.10.2
    bootstrapDns:
      ips: []
      upstream: "1.1.1.1"
    queryLog:
      type: ""
    configmap:
      dashboard:
        enabled: false
      datasource:
        enabled: false
    cnpg:
      main:
        enabled: false
    metrics:
      main:
        enabled: true
    autoscaling:
      vpa:
        enabled: false
    resources:
      requests:
        memory: 200Mi
        cpu: 20m
      limits:
        memory: 1Gi
        cpu: 500m
