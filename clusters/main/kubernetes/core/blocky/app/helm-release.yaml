          dnsserver: 192.168.10.154
        - domain: dns.lan
          dnsserver: 192.168.10.2
    bootstrapDns:
      ips: []
      upstream: "1.1.1.1"
    queryLog:
      type: ""
    configmap:
      dashboard:
        enabled: false
      datasource:
        enabled: false
    cnpg:
      main:
        enabled: false
    metrics:
      main:
        enabled: true
    autoscaling:
      vpa:
        enabled: false
    resources:
      requests:
        memory: 200Mi
        cpu: 20m
      limits:
        memory: 1Gi
        cpu: 500m
