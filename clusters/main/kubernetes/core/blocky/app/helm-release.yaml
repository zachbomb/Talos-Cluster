---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: blocky
spec:
  interval: 15m
  chart:
    spec:
      chart: blocky
      version: 21.1.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false
    service:
      dns:
        externalTrafficPolicy: Local
        loadBalancerIP: ${BLOCKY_IP}
        type: LoadBalancer
        integrations:
          metallb:
            enabled: true
    workload:
      main:
        replicas: 1
    blocking:
      clientGroupsBlock: []
    k8sgateway:
      domains:
        - domain: ${DOMAIN_0}
          dnsChallenge:
            enabled: false
            domain: dns01.clouddns.com
    defaultUpstreams:
      - "https://1.1.1.1/dns-query"
    customDNS:
      customTTL: 1h
      filterUnmappedTypes: true
      rewrite: []
      mapping:
        - domain: sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: proxy.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: goodmem.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: traefik.sf.wethecommon.com
          dnsserver: 192.168.10.196
        # Internal-only services (lockdown plan 2026-05-05) — LAN/VPN reaches Traefik directly
        - domain: pihole.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: pihole-k8s.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: proxmox.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: truenas.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: minio.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: longhorn.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: grafana.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: uptime.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: homepage.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: code.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: sonarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: radarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: lidarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: lidarr-flac.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: lidarr-liz.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: readarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: bazarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: prowlarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: kapowarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: mylar.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: sabnzbd.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: nzbget.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: deluge.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: tunarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: tunarr-code.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: dizquetv.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: tdarr.sf.wethecommon.com
          dnsserver: 192.168.10.196
        - domain: tinymediamanager.sf.wethecommon.com
