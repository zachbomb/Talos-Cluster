---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: blocky
spec:
  interval: 15m
  chart:
    spec:
      chart: blocky
      version: 22.14.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Migrated off Bitnami (paid bitnamisecure tier, HTTP 401 on pull) to
    # the official upstream valkey/valkey image (#182). The TrueCharts redis
    # subchart defaults to the bitnami entrypoint + /health probe scripts;
    # valkey/valkey is a plain image, so we override command/args/probes:
    #   - run valkey-server directly with --requirepass (valkey/valkey does
    #     NOT read the bitnami VALKEY_PASSWORD env var)
    #   - --dir /tmp --save "" --appendonly no: pure in-memory cache (no PVC).
    #     blocky's redis is just a DNS-query cache — fully regenerable, so
    #     losing it on restart is harmless. /tmp is a writable emptyDir.
    #   - probes use valkey-cli -a instead of the bitnami /health scripts.
    redis:
      image:
        repository: docker.io/valkey/valkey
        tag: 8.1.8-alpine
        pullPolicy: IfNotPresent
      workload:
        main:
          podSpec:
            containers:
              main:
                command:
                  - valkey-server
                args:
                  - --requirepass
                  - PLACEHOLDERPASSWORD
                  - --port
                  - "6379"
                  - --dir
                  - /tmp
                  - --save
                  - ""
                  - --appendonly
                  - "no"
                probes:
                  liveness:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]
                  readiness:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]
                  startup:
                    type: exec
                    command: [valkey-cli, -a, PLACEHOLDERPASSWORD, ping]

    global:
      stopAll: false
    service:
      dns:
        externalTrafficPolicy: Local
        loadBalancerIP: ${BLOCKY_IP}
        type: LoadBalancer
        integrations:
          metallb:
            enabled: true
    workload:
      main:
        replicas: 1
    blocking:
      clientGroupsBlock: []
    k8sgateway:
      domains:
        - domain: ${DOMAIN_0}
          dnsChallenge:
            enabled: false
            domain: dns01.clouddns.com
    defaultUpstreams:
      - "https://1.1.1.1/dns-query"
    customDNS:
      customTTL: 1h
      filterUnmappedTypes: true
      rewrite: []
      mapping:
        - domain: sf.wethecommon.com
          dnsserver: 192.168.10.196
