# Negative fixture for the prometheus-rules-ci CI guard.
#
# AlertmanagerConfig with continue: true reaching discord-critical, breaking
# the routing-exclusivity invariant (origin R3). The CI guard MUST fail when
# validating this fixture.
#
# Plan: docs/plans/2026-05-07-001-feat-alerting-hitl-framework-plan.md (U8)

apiVersion: monitoring.coreos.com/v1beta1
kind: AlertmanagerConfig
metadata:
  name: bad-route-continue-true
  namespace: kube-prometheus-stack
spec:
  route:
    receiver: "null"
    routes:
      - receiver: discord-critical
        matchers:
          - name: severity
            value: critical
            matchType: =
        continue: true  # WRONG: would double-route critical to additional receivers
  receivers:
    - name: "null"
    - name: discord-critical
