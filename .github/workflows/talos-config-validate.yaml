name: "Talos Config Validate"

on:
  pull_request:
    paths:
      - "clusters/main/talos/**"
      - "clusters/main/clusterenv.yaml"
      - ".sops.yaml"

concurrency:
  group: talos-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  syntax:
    name: YAML syntax + talconfig schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yamllint
        run: pip install --user yamllint

      - name: YAML lint talos directory
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: disable, document-start: disable, truthy: disable}}' \
            clusters/main/talos/talconfig.yaml \
            clusters/main/talos/patches/

      - name: Install talhelper
        run: |
          TALHELPER_VERSION="$(curl -sL https://api.github.com/repos/budimanjojo/talhelper/releases/latest | jq -r .tag_name)"
          curl -sL "https://github.com/budimanjojo/talhelper/releases/download/${TALHELPER_VERSION}/talhelper_linux_amd64.tar.gz" \
            | tar -xz -C /tmp talhelper
          sudo install -m 0755 /tmp/talhelper /usr/local/bin/talhelper
          talhelper --version

      - name: Validate talconfig schema (no secrets needed)
        env:
          CLUSTERNAME: main
          VIP: 192.168.0.1
          MASTER1IP_IP: 192.168.0.2
          MASTER1IP_CIDR: 192.168.0.2/24
          GATEWAY: 192.168.0.254
          PODNET: 10.42.0.0/16
          SVCNET: 10.43.0.0/16
          DOMAIN_0: example.com
          METALLB_RANGE: 192.168.0.100-192.168.0.200
          HEADLAMP_IP: 192.168.0.50
        run: |
          # Substitute placeholder values so talhelper can parse the schema.
          # Real values come from the SOPS-encrypted clusterenv.yaml at apply time;
          # this step only validates that the TALCONFIG schema is correct.
          # talhelper validate talconfig reads talconfig.yaml from cwd — copy resolved
          # file into a scratch dir and run there.
          mkdir -p /tmp/talconfig-validate
          envsubst < clusters/main/talos/talconfig.yaml > /tmp/talconfig-validate/talconfig.yaml
          # Also copy patches/ since talconfig references them.
          cp -r clusters/main/talos/patches /tmp/talconfig-validate/
          cd /tmp/talconfig-validate && talhelper validate talconfig

  genconfig:
    name: Full genconfig (requires AGE_KEY secret)
    runs-on: ubuntu-latest
    # Only run on this repo (not forks) — the AGE_KEY secret isn't available to forks anyway.
    if: ${{ github.repository_owner == 'zachbomb' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for AGE_KEY secret
        id: check_secret
        env:
          AGE_KEY: ${{ secrets.AGE_KEY }}
        run: |
          if [ -z "${AGE_KEY}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AGE_KEY secret is not set. Skipping full genconfig validation."
            echo "::notice::To enable, add the contents of age.agekey as a repo secret named AGE_KEY."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up tools
        if: steps.check_secret.outputs.available == 'true'
        run: |
          TALHELPER_VERSION="$(curl -sL https://api.github.com/repos/budimanjojo/talhelper/releases/latest | jq -r .tag_name)"
          curl -sL "https://github.com/budimanjojo/talhelper/releases/download/${TALHELPER_VERSION}/talhelper_linux_amd64.tar.gz" \
            | tar -xz -C /tmp talhelper
          sudo install -m 0755 /tmp/talhelper /usr/local/bin/talhelper

          SOPS_VERSION="$(curl -sL https://api.github.com/repos/getsops/sops/releases/latest | jq -r .tag_name)"
          curl -sL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" \
            -o /tmp/sops
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops

      - name: Decrypt clusterenv and generate machine config
        if: steps.check_secret.outputs.available == 'true'
        env:
          AGE_KEY: ${{ secrets.AGE_KEY }}
          # CLUSTERNAME isn't in clusterenv.yaml — locally it comes from
          # clustertool/forgetool's --cluster flag (default "main"). Set it here.
          CLUSTERNAME: main
        run: |
          set -euo pipefail
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

          # Decrypt clusterenv.yaml and export each scalar as an env var, then run
          # talhelper genconfig — talhelper reads ${VAR} substitutions from the
          # process environment when no talenv.yaml is auto-discovered.
          # We also derive *_IP, *_NETMASK, *_CIDR for any IP-shaped value, matching
          # clustertool's PostProcessTalEnv behavior (pkg/initfiles/clusterenv.go).
          sops --decrypt clusters/main/clusterenv.yaml > /tmp/clusterenv.yaml
          python3 - <<'PY' > /tmp/clusterenv.export.sh
          import yaml, shlex, ipaddress
          d = yaml.safe_load(open('/tmp/clusterenv.yaml'))
          out = {}
          for k, v in d.items():
              if not isinstance(v, (str, int, float, bool)) or str(v) == '':
                  continue
              s = str(v)
              out[k] = s
              # Mirror clustertool's splitIPandNetmask: derive _IP/_NETMASK/_CIDR
              # from anything that looks like a valid IP (with or without /MASK).
              try:
                  if '/' in s:
                      net = ipaddress.ip_interface(s)
                      ip = str(net.ip); mask = str(net.network.prefixlen)
                  else:
                      ipaddress.ip_address(s)
                      ip = s; mask = '24'  # default per clustertool
                  out[k + '_IP'] = ip
                  out[k + '_NETMASK'] = mask
                  out[k + '_CIDR'] = f'{ip}/{mask}'
              except (ValueError, ipaddress.AddressValueError):
                  pass
          for k, v in out.items():
              print(f'export {k}={shlex.quote(v)}')
          PY
          # Source the exports into the current shell.
          # shellcheck disable=SC1091
          source /tmp/clusterenv.export.sh

          # Sanity check — fail fast if substitution still won't work.
          : "${CLUSTERNAME:?CLUSTERNAME not set (workflow env or clusterenv.yaml)}"
          : "${VIP:?VIP not exported from clusterenv.yaml}"

          cd clusters/main/talos
          talhelper genconfig --out-dir /tmp/generated

          # Scrub plaintext copies (runner is ephemeral anyway, but belt-and-suspenders).
          shred -uz /tmp/clusterenv.yaml /tmp/clusterenv.export.sh 2>/dev/null \
            || rm -f /tmp/clusterenv.yaml /tmp/clusterenv.export.sh
          rm -f ~/.config/sops/age/keys.txt

      - name: Validate generated machine config against Talos schema
        if: steps.check_secret.outputs.available == 'true'
        run: |
          TALOS_VERSION="$(grep -oE 'talosVersion: v[0-9.]+' clusters/main/talos/talconfig.yaml | awk '{print $2}')"
          curl -sL "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64" \
            -o /tmp/talosctl
          sudo install -m 0755 /tmp/talosctl /usr/local/bin/talosctl

          for f in /tmp/generated/*.yaml; do
            [ -f "$f" ] || continue
            case "$(basename "$f")" in
              talosconfig|*.tmpl) continue ;;
            esac
            echo "Validating: $f"
            talosctl validate --config "$f" --mode metal
          done
