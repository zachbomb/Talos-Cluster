name: alert-remediation-hitl image

# Builds + pushes the receiver image on push to main when source under
# apps/alert-remediation-hitl/** changes. Deployment manifest references
# the image by digest (@sha256:...) — Renovate keeps the digest in sync.
#
# Plan: docs/plans/2026-05-07-001-feat-alerting-hitl-framework-plan.md (U12)
#
# Security note: untrusted GitHub event inputs (refs, etc.) are consumed via
# env: blocks rather than ${{ }} interpolation in run: scripts.

on:
  push:
    branches:
      - main
    paths:
      - "apps/alert-remediation-hitl/**"
      - ".github/workflows/alert-remediation-image.yaml"
    tags:
      - "alert-remediation-hitl-v*"
  pull_request:
    paths:
      - "apps/alert-remediation-hitl/**"

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/alert-remediation-hitl

jobs:
  build:
    name: Build + push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          IS_PUSH: ${{ github.event_name == 'push' }}
          IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/alert-remediation-hitl-v') }}
        run: |
          set -euo pipefail
          short_sha="${SHA:0:7}"
          tags="${IMAGE_NAME}:sha-${short_sha}"
          if [ "${IS_PUSH}" = "true" ] && [ "${IS_MAIN}" = "true" ]; then
            tags="${tags},${IMAGE_NAME}:latest"
          fi
          if [ "${IS_TAG}" = "true" ]; then
            tag_version="${REF_NAME#alert-remediation-hitl-}"
            tags="${tags},${IMAGE_NAME}:${tag_version}"
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Build (PR — verify only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: apps/alert-remediation-hitl
          file: apps/alert-remediation-hitl/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push (main / tag)
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: apps/alert-remediation-hitl
          file: apps/alert-remediation-hitl/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed digest
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          echo "Image digest: ${DIGEST}"
          echo "Update the deployment manifest's image: field to:"
          echo "  ${IMAGE_NAME}@${DIGEST}"
